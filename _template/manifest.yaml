# =============================================================================
# Veltrix App Manifest Template
#
# This file declares your app's contract with the Veltrix platform.
# Every app MUST define pipeline handlers - Security-as-Code is mandatory.
#
# Copy this _template directory, rename it, and customize.
# =============================================================================

id: "my-app"                           # Unique slug (lowercase, hyphens only)
name: "My Security App"
version: "1.0.0"
vendor: "Your Company"
description: "A brief description of what this app manages"
category: "SIEM"                       # SIEM, EDR, SOAR, IAM, NETWORK, CLOUD, CUSTOM
license: "MIT"
homepage: "https://github.com/your-org/veltrix-app-my-app"
icon: "🛠️"                            # Emoji, or a repo-relative file like ./assets/icon.svg
logo: "./assets/logo.svg"

# Minimum platform version this app requires
platform:
  minVersion: "1.0.0"

# =============================================================================
# Branding (optional) — your vendor identity, applied by the platform in
# defined slots only: the app's navbar (logo + accent) and scoped CSS
# variables (--veltrix-app-primary / --veltrix-app-accent) that your pages
# can use. The platform decides where brand color appears, so use it
# meaningfully — it never themes the whole product shell.
#   - Colors: #RGB or #RRGGBB hex
#   - Logos: .svg (preferred) or .png, max 128 KB, rendered at ~28px height —
#     use a wide/landscape mark with transparent background; no scripts in SVGs
# =============================================================================
branding:
  primaryColor: "#4F6DF5"
  logo: ./assets/logo.svg

# =============================================================================
# PERMISSIONS
# =============================================================================
permissions:
  # What this app needs from the platform
  platform:
    - "components:read"
    - "credentials:read"
    - "tags:read"
    - "canvas:read"
    - "canvas:create"
    - "canvas:update"

  # Permissions this app EXPOSES (admins assign these to roles)
  app:
    - resource: "my-app:configs"
      actions: ["read", "create", "update", "delete"]
      description: "Manage my-app configurations"

# =============================================================================
# PIPELINE INTEGRATION (MANDATORY)
#
# This is what makes Security-as-Code work.
# Every app must define at least one configuration type with handlers.
# =============================================================================
pipeline:
  configurationTypes:
    - id: "configs"                    # Unique within this app
      name: "App Configuration"
      description: "Main configuration for this tool"
      # Canonical layout: everything for one configuration type is colocated
      # in config-types/<configTypeId>/
      canvasTemplate: config-types/configs/canvas.yaml
      defaultConfig: config-types/configs/defaults.yaml

      # Pipeline handlers — config-types/<configTypeId>/<handler>
      # (extensionless; resolved like require(), .ts in dev / compiled .js in packages)
      handlers:
        validate: config-types/configs/validate
        deploy: config-types/configs/deploy
        rollback: config-types/configs/rollback
        healthCheck: config-types/configs/healthCheck
        driftDetect: config-types/configs/driftDetect
        getStatus: config-types/configs/getStatus

      # What infrastructure this configuration targets
      targets:
        componentTypes: ["server"]     # Which component types to deploy to
        requiresCredential: true       # Needs tool credentials for auth
        requiresConnectivity: true     # Needs SSH/API access to components

  # Events your app emits (other apps can subscribe)
  pipelineEvents:
    - "my-app:config-deployed"
    - "my-app:health-changed"

# =============================================================================
# DATABASE (optional - only if your app needs its own tables)
# =============================================================================
database:
  migrations: migrations              # Canonical layout: migrations/*.sql at app root
  tablePrefix: "app_myapp_"           # All tables MUST be prefixed

# =============================================================================
# SERVER
# =============================================================================
server:
  entry: server/index
  routes:
    prefix: "/api/apps/my-app"        # All routes namespaced under this prefix

# =============================================================================
# CLIENT (optional - for custom UI pages)
# =============================================================================
# The platform renders the chrome for every app page — breadcrumb, app header,
# navigation, permission gating, loading + error states — so apps look and
# navigate predictably. Your component renders the page body and composes it
# from @veltrixsecops/ui.
client:
  entry: client/index
  # navLayout controls how the platform lays out this app's navigation (your
  # client pages + one entry per configuration type):
  #   tabs    (default) — a horizontal tab strip; best for a few items
  #   sidebar           — an embedded left rail grouped into Pages and
  #                       Configurations; use this when the app will have many
  #                       configuration types (a tab strip can't hold them all)
  navLayout: tabs
  pages:
    - path: "/"                       # Route beneath the app: /apps/my-app
      component: "Dashboard"          # Exported from client/index
      label: "Overview"
      description: "What this app manages at a glance"
      icon: "shield"                  # Platform icon set; falls back to the app icon
      nav: sidebar                    # sidebar | tab | hidden
      order: 1                        # Deterministic ordering
      layout: standard                # standard | full-bleed | canvas

    # A tab inside the Overview page, visible only to users holding the
    # app permission it declares (must exist in permissions.app above).
    - path: "/configs"
      component: "ConfigsTab"
      label: "Configurations"
      nav: tab
      parent: "/"
      order: 1
      layout: standard
      requiresPermission:
        resource: "my-app:configs"
        action: "read"

    # Inventory — the built-in deployment-target surface (servers, domains,
    # IP/CIDR ranges) available to every app via '@veltrixsecops/app-sdk/client'.
    - path: "/inventory"
      component: "InventoryPage"
      label: "Inventory"
      description: "Deployment targets this app can deploy configuration to"
      icon: "server"
      nav: sidebar
      group: config
      order: 2
      layout: standard

# =============================================================================
# CONNECTIVITY (automatically provided by the platform)
#
# Every app that sets requiresConnectivity: true on a pipeline config type
# automatically gets access to the customer's configured connectivity
# provider (Tailscale, SSH, WireGuard, Cloudflare Tunnel, etc.) via
# ctx.connectivityProvider in all pipeline handler contexts.
#
# The platform provides a shared Settings UI component that apps can embed:
#   import { ConnectivityProvidersView } from '@/features/connectivity-providers'
#
# You do NOT need to build your own connectivity config — just import the
# shared view in your app's Settings tab/page.
# =============================================================================

# =============================================================================
# LIFECYCLE HOOKS (optional)
# =============================================================================
# Canonical layout: hooks/<hookName>.ts (camelCase)
hooks:
  onInstall: hooks/onInstall
  onUninstall: hooks/onUninstall

# =============================================================================
# PLATFORM EVENTS this app subscribes to (optional)
# =============================================================================
events:
  - "component:created"
  - "component:updated"
  - "credential:created"

# =============================================================================
# SETTINGS (admin-configurable per customer)
# =============================================================================
settings:
  - key: "api_endpoint"
    type: "string"
    label: "Tool API Endpoint"
    description: "Base URL for the tool's management API"
    required: true

  - key: "require_approval"
    type: "boolean"
    label: "Require Approval for Changes"
    default: true

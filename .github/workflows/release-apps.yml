name: Release Apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
  workflow_dispatch:
    inputs:
      package_all:
        description: 'Package and release all apps (not just changed ones)'
        required: false
        default: true
        type: boolean

concurrency:
  group: release-apps
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Package, release, and update catalog
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tooling
        run: npm ci

      - name: Detect apps to release
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.package_all }}" = "true" ]; then
            APPS=$(ls -d apps/*/manifest.yaml 2>/dev/null | cut -d'/' -f2 | sort -u || true)
          else
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              APPS=$(git diff --name-only HEAD~1 HEAD -- apps/ | cut -d'/' -f2 | sort -u | grep -v '^$' || true)
            else
              APPS=$(ls -d apps/*/manifest.yaml 2>/dev/null | cut -d'/' -f2 | sort -u || true)
            fi
          fi
          echo "Apps to release: $APPS"
          echo "apps<<EOF" >> "$GITHUB_OUTPUT"
          echo "$APPS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate, package, and release
        if: steps.detect.outputs.apps != ''
        run: |
          mkdir -p dist/apps
          FAILED=0
          while IFS= read -r APP; do
            [ -z "$APP" ] && continue
            [ -f "apps/$APP/manifest.yaml" ] || { echo "apps/$APP has no manifest (deleted?) — skipping"; continue; }

            echo "=== $APP ==="
            node scripts/validate-app.mjs "apps/$APP" || { FAILED=1; continue; }

            VERSION=$(node -e "const y=require('js-yaml');console.log(y.load(require('fs').readFileSync('apps/$APP/manifest.yaml','utf8')).version)")
            TAG="$APP-v$VERSION"

            # Stage the app and transpile server-side TypeScript to CommonJS JS.
            # The hosted platform runs compiled code (no TypeScript loader), so
            # packages must contain runnable .js next to the .ts sources.
            STAGING=$(mktemp -d)
            rsync -a \
              --exclude node_modules --exclude .git --exclude __tests__ \
              --exclude '*.test.*' --exclude .DS_Store --exclude __pycache__ \
              "apps/$APP/" "$STAGING/"
            TS_FILES=$(find "$STAGING" -name '*.ts' -not -path '*/client/*')
            if [ -n "$TS_FILES" ]; then
              # shellcheck disable=SC2086
              npx esbuild $TS_FILES --format=cjs --platform=node --target=node20 \
                --outdir="$STAGING" --outbase="$STAGING" --log-level=warning
            fi
            # Bundle the client entry (if declared) into the hermetic browser
            # bundle the platform serves for the app's custom pages.
            node scripts/bundle-app-client.mjs "$STAGING" || { FAILED=1; rm -rf "$STAGING"; continue; }
            (cd "$STAGING" && zip -qr "$GITHUB_WORKSPACE/dist/apps/$APP.zip" .)
            rm -rf "$STAGING"

            SIZE=$(stat -c%s "dist/apps/$APP.zip")
            if [ "$SIZE" -gt $((50 * 1024 * 1024)) ]; then
              echo "::error::$APP package exceeds 50 MB ($SIZE bytes)"
              rm "dist/apps/$APP.zip"; FAILED=1; continue
            fi

            (cd dist/apps && sha256sum "$APP.zip" > "$APP.zip.sha256")

            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "::warning::Release $TAG already exists — bump manifest.version to publish a new package. Skipping."
            else
              NOTES=$(printf 'Automated release of the `%s` app, version `%s`.\n\nInstall via the Veltrix App Management UI, or by URL:\n`https://github.com/%s/releases/download/%s/%s.zip`\n\nThe SHA-256 checksum is attached as `%s.zip.sha256` and published in the marketplace catalog.' \
                "$APP" "$VERSION" "${{ github.repository }}" "$TAG" "$APP" "$APP")
              gh release create "$TAG" \
                "dist/apps/$APP.zip" "dist/apps/$APP.zip.sha256" \
                --title "$APP v$VERSION" \
                --notes "$NOTES"
              echo "Released $TAG"
            fi
          done <<< "${{ steps.detect.outputs.apps }}"
          exit $FAILED

      - name: Update apps-latest compatibility alias
        if: steps.detect.outputs.apps != ''
        run: |
          if ! gh release view apps-latest >/dev/null 2>&1; then
            gh release create apps-latest \
              --title "Community Apps (Latest)" \
              --notes "Rolling alias with the newest package of every app. Prefer the immutable per-app releases (\`<app-id>-v<version>\`) — this alias exists for backward compatibility." \
              --latest=false
          fi
          for ZIP in dist/apps/*.zip; do
            [ -e "$ZIP" ] || continue
            gh release upload apps-latest "$ZIP" --clobber
          done

      - name: Rebuild marketplace catalog
        run: node scripts/build-catalog.mjs --repo "${{ github.repository }}"

      - name: Commit catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog/catalog.json
          if git diff --cached --quiet; then
            echo "Catalog unchanged"
          else
            git commit -m "chore(catalog): update marketplace catalog [skip ci]"
            git push
          fi

      # Pushes made with GITHUB_TOKEN don't trigger other workflows, so the
      # catalog commit above can't fire deploy-catalog.yml — deploy here.
      - name: Upload catalog Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: catalog/

      - name: Deploy catalog to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Summary
        if: steps.detect.outputs.apps != ''
        run: |
          echo "## Released Apps" >> "$GITHUB_STEP_SUMMARY"
          for F in dist/apps/*.zip; do
            [ -e "$F" ] || continue
            NAME=$(basename "$F" .zip)
            SIZE=$(stat -c%s "$F")
            echo "- **$NAME** ($(numfmt --to=iec "$SIZE"))" >> "$GITHUB_STEP_SUMMARY"
          done

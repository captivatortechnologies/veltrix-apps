# Defaults for a new rate limit quota item.
#
# Intentionally empty: the platform no longer seeds system default values into a
# new item — it starts blank (the canvas defaultValue for `interval` ("1s") and
# `blockInterval` ("0s") pre-fills those fields on its own). Users manage their
# own default value sets and can apply one when creating an item. Any values here
# would be a FLAT map keyed by the canvas field keys (name, path, rate, interval,
# blockInterval, role), since a quota's single presentational group is one flat
# item record.

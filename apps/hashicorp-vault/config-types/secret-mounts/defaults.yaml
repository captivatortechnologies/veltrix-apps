# Defaults for a new secret engine mount item.
#
# Intentionally empty: the platform no longer seeds system default values into a
# new item — it starts blank. Users manage their own default value sets and can
# apply one when creating an item. Any values here would be a FLAT map keyed by
# the canvas field keys (path, type, description, kvVersion, defaultLeaseTtl,
# maxLeaseTtl), since a mount's presentational groups share one flat item record.

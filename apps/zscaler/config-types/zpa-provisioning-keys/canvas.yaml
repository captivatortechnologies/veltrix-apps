# =============================================================================
# Canvas Template — ZPA Provisioning Keys
#
# Declares ONE provisioning key — the item. Users add as many as they need.
# A ZPA provisioning key lets an App Connector (CONNECTOR_GRP) or a Private
# Service Edge (SERVICE_EDGE_GRP) enroll itself into a component group. ZPA
# assigns it a numeric id (returned as a string). Identity is the pair
# (association_type, NAME): a key name is unique WITHIN its association type, so
# CRUD lives under /associationType/{association_type}/provisioningKey. ZPA
# changes apply immediately — there is no activation step.
#
# ⚠ SECRET: the generated key VALUE (`provisioningKey` in the API response) is
# write-only. It is never read back into drift, rollback state, artifacts or
# logs — only the key's id and scalar settings are managed here.
#
# Field keys must match what config-types/zpa-provisioning-keys/validate.ts checks.
# =============================================================================

id: "zscaler-zpa-provisioning-keys"
name: "ZPA Provisioning Key Configuration"
toolType: "zscaler"
entityType: "zpa-provisioning-keys"
description: "Define ZPA provisioning keys as code through the Zscaler OneAPI (/associationType/{type}/provisioningKey). The generated key value is write-only. Requires the ZPA Customer ID app setting."

item:
  label: "Provisioning Key"
  identityField: "name"
  repeatable: true
  minItems: 1
  maxItems: 200
  groups:
    - name: "Provisioning Key"
      icon: "key"
      description: "Name, association type and usage limit"
      fields:
        - key: "name"
          label: "Name"
          fieldType: "text"
          required: true
          validation:
            maxLength: 255
          helpText: "The provisioning key name (its logical identity within the association type). ZPA assigns the numeric id."

        - key: "association_type"
          label: "Association Type"
          fieldType: "select"
          required: true
          defaultValue: "CONNECTOR_GRP"
          options:
            - label: "App Connector (CONNECTOR_GRP)"
              value: "CONNECTOR_GRP"
            - label: "Private Service Edge (SERVICE_EDGE_GRP)"
              value: "SERVICE_EDGE_GRP"
          helpText: "Which kind of component this key enrolls — an App Connector or a Private Service Edge. Determines the component group collection resolved."

        - key: "max_usage"
          label: "Max Usage"
          fieldType: "number"
          required: true
          defaultValue: 10
          validation:
            min: 1
          helpText: "How many times the key may be used to enroll a component. A positive integer; defaults to 10."

        - key: "enabled"
          label: "Enabled"
          fieldType: "checkbox"
          defaultValue: true
          helpText: "Whether the provisioning key is enabled (a disabled key cannot enroll components)."

    - name: "References"
      icon: "link"
      description: "The component group and enrollment certificate this key uses (resolved by name to ids at deploy time)"
      fields:
        - key: "component_group_name"
          label: "Component Group Name"
          fieldType: "text"
          required: true
          helpText: "Name of the App Connector group (for CONNECTOR_GRP) or Service Edge group (for SERVICE_EDGE_GRP) this key provisions into. Resolved to zcomponentId at deploy time — create the group first."

        - key: "enrollment_cert_name"
          label: "Enrollment Certificate Name"
          fieldType: "text"
          required: true
          helpText: "Name of the ZPA enrollment certificate to sign enrollments with (e.g. \"Connector\" or \"Service Edge\"). Resolved to enrollmentCertId at deploy time."

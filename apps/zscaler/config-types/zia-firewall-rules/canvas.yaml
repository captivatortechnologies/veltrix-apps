# =============================================================================
# Canvas Template — ZIA Cloud Firewall Filtering Rules
#
# Declares ONE cloud firewall filtering rule — the item. Users add as many rules
# as they need. A ZIA firewall rule matches traffic (by source/destination IP
# groups, network services, applications, users, …) and takes an action;
# Zscaler assigns it a numeric id and evaluates rules in `order`. Identity is the
# NAME (list + match).
#
# The many type-specific matching criteria (srcIpGroups, destIpGroups,
# nwServices, srcIps, destAddresses, …) live in a single JSON escape-hatch field,
# `rule_json`, so authors can express any criterion the API accepts without this
# template enumerating them all. The first-class fields (name / order / state /
# action) are the ones drift detection and health checks reason about.
#
# The predefined DEFAULT firewall rule is read-only — deploy refuses to modify or
# delete it (rename your rule to manage a custom one).
#
# Field keys must match what config-types/zia-firewall-rules/validate.ts checks.
# =============================================================================

id: "zscaler-zia-firewall-rules"
name: "ZIA Firewall Rule Configuration"
toolType: "zscaler"
entityType: "zia-firewall-rules"
description: "Define ZIA cloud firewall filtering rules as code through the Zscaler OneAPI (/firewallFilteringRules). Changes are staged and activated as a batch."

item:
  label: "Firewall Rule"
  identityField: "name"
  repeatable: true
  minItems: 1
  maxItems: 200
  groups:
    - name: "Firewall Rule"
      icon: "network"
      description: "Name, order, state and action"
      fields:
        - key: "name"
          label: "Name"
          fieldType: "text"
          required: true
          validation:
            maxLength: 255
          helpText: "The firewall rule name (its logical identity). Zscaler assigns the numeric id."

        - key: "order"
          label: "Order"
          fieldType: "number"
          defaultValue: 1
          validation:
            min: 1
          helpText: "Rule evaluation order (1 = evaluated first). A positive integer."

        - key: "state"
          label: "State"
          fieldType: "select"
          defaultValue: "ENABLED"
          options:
            - label: "Enabled"
              value: "ENABLED"
            - label: "Disabled"
              value: "DISABLED"
          helpText: "Whether the rule is active."

        - key: "action"
          label: "Action"
          fieldType: "select"
          defaultValue: "BLOCK_DROP"
          options:
            - label: "Allow"
              value: "ALLOW"
            - label: "Block / Drop (silently drop)"
              value: "BLOCK_DROP"
            - label: "Block / Reset (drop + TCP reset)"
              value: "BLOCK_RESET"
          helpText: "Action taken on traffic that matches this rule."

    - name: "Matching Criteria (JSON)"
      icon: "settings"
      description: "Advanced rule body as a JSON object"
      fields:
        - key: "rule_json"
          label: "Rule Criteria (JSON)"
          fieldType: "textarea"
          helpText: >-
            Optional JSON object holding the rule's matching criteria and advanced
            fields, e.g.
            {"srcIpGroups":[{"id":123}],"destIpGroups":[{"id":456}],"nwServices":[{"id":789}],"srcIps":["10.0.0.0/8"]}.
            Its keys are merged into the request body; name / order / state /
            action always come from the fields above and win over any same-named
            JSON keys. Leave blank for a rule with no extra criteria.

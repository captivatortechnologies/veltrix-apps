id: zscaler
name: Zscaler
version: "1.2.0"
vendor: Veltrix
description: >
  Manage Zscaler Internet Access (ZIA) and Zscaler Private Access (ZPA)
  configuration as code through the Zscaler OneAPI. Covers URL filtering,
  cloud firewall, DLP, SSL inspection, locations and admin config on ZIA, and
  application segments, server/segment groups, connectors and access policy on
  ZPA - with validation, drift detection and rollback handled by the
  Security-as-Code pipeline. ZIA changes are staged and activated as a batch;
  ZPA changes apply immediately.
category: NETWORK
license: Apache-2.0
homepage: https://github.com/captivatortechnologies/veltrix-apps/tree/main/apps/zscaler
icon: "🛡️"

platform:
  minVersion: "1.0.0"

# Zscaler brand: the Zscaler blue with a cyan accent.
branding:
  primaryColor: "#0075BE"
  accentColor: "#00A3E0"
  logo: ./assets/logo.svg
  logoDark: ./assets/logo-dark.svg

permissions:
  platform:
    - configuration-canvas:read
    - component:read
    - credential:read
  app:
    - resource: zia-url-filtering-rules
      actions: [read, write, delete]
      description: Manage Zscaler custom URL filtering rules
    - resource: zia-url-categories
      actions: [read, write, delete]
      description: Manage Zscaler custom URL categories
    - resource: zia-firewall-rules
      actions: [read, write, delete]
      description: Manage Zscaler cloud firewall filtering rules
    - resource: zia-firewall-dns-rules
      actions: [read, write, delete]
      description: Manage Zscaler DNS control rules
    - resource: zia-firewall-ips-rules
      actions: [read, write, delete]
      description: Manage Zscaler IPS control rules
    - resource: zia-ssl-inspection-rules
      actions: [read, write, delete]
      description: Manage Zscaler SSL inspection rules
    - resource: zia-file-type-rules
      actions: [read, write, delete]
      description: Manage Zscaler file type control rules
    - resource: zia-sandbox-rules
      actions: [read, write, delete]
      description: Manage Zscaler sandbox rules
    - resource: zia-web-dlp-rules
      actions: [read, write, delete]
      description: Manage Zscaler web DLP rules
    - resource: zia-network-services
      actions: [read, write, delete]
      description: Manage Zscaler custom network services
    - resource: zia-network-service-groups
      actions: [read, write, delete]
      description: Manage Zscaler network service groups
    - resource: zia-network-app-groups
      actions: [read, write, delete]
      description: Manage Zscaler network application groups
    - resource: zia-ip-source-groups
      actions: [read, write, delete]
      description: Manage Zscaler IP source groups
    - resource: zia-ip-destination-groups
      actions: [read, write, delete]
      description: Manage Zscaler IP destination groups
    - resource: zia-dlp-dictionaries
      actions: [read, write, delete]
      description: Manage Zscaler custom DLP dictionaries
    - resource: zia-dlp-engines
      actions: [read, write, delete]
      description: Manage Zscaler custom DLP engines
    - resource: zia-dlp-notification-templates
      actions: [read, write, delete]
      description: Manage Zscaler DLP notification templates
    - resource: zia-locations
      actions: [read, write, delete]
      description: Manage Zscaler locations
    - resource: zia-vpn-credentials
      actions: [read, write, delete]
      description: Manage Zscaler VPN credentials
    - resource: zia-gre-tunnels
      actions: [read, write, delete]
      description: Manage Zscaler GRE tunnels
    - resource: zia-static-ips
      actions: [read, write, delete]
      description: Manage Zscaler static IPs
    - resource: zia-admin-roles

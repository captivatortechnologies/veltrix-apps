server:
  entry: server/index
  routes:
    prefix: /api/apps/zscaler

client:
  entry: client/index
  navLayout: sidebar
  pages:
    - path: /overview
      component: OverviewPage
      label: Overview
      icon: shield
      nav: sidebar
    - path: /setup
      component: SetupGuidePage
      label: Setup Guide
      icon: book
      nav: sidebar
    # Connections — Settings nav group. Pairs a Zscaler tenant (component) with
    # the OAuth2 client-credentials pair used to reach it, with a connectivity test.
    - path: /connections
      component: ConnectionsPage
      label: Connections
      icon: link
      nav: sidebar
      group: settings

connectivity:
  testHandler: handlers/testConnection

hooks:
  onInstall: hooks/onInstall
  onUninstall: hooks/onUninstall

settings:
  - key: cloud
    type: string
    label: Cloud
    description: >
      Zscaler cloud/environment. Leave blank for commercial production
      (api.zsapi.net). Use "gov" or "govus" for government clouds, or a named
      non-prod cloud (e.g. "beta").
    default: ""
    required: false
  - key: zpa_customer_id
    type: string
    label: ZPA Customer ID
    description: >
      The ZPA tenant id, required for every ZPA configuration type (found in the
      ZPA Admin Portal under Configuration & Control > Public API > API Keys).
      ZIA-only deployments can leave this blank.
    default: ""
    required: false
  - key: zpa_microtenant_id
    type: string
    label: ZPA Microtenant ID
    description: Optional ZPA microtenant id to scope ZPA config to a single microtenant.
    default: ""
    required: false
  - key: request_timeout_seconds
    type: number
    label: Request Timeout (seconds)
    description: Per-request timeout for Zscaler OneAPI calls.
    default: 30
    required: false

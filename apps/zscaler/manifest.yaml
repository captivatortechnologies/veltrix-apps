pipeline:
  configurationTypes:
    - id: zia-url-filtering-rules
      group: "ZIA · Policy Rules"
      name: ZIA URL Filtering Rules
      description: URL filtering policy rules (/urlFilteringRules); staged then activated as a batch
      canvasTemplate: config-types/zia-url-filtering-rules/canvas.yaml
      defaultConfig: config-types/zia-url-filtering-rules/defaults.yaml
      handlers:
        validate: config-types/zia-url-filtering-rules/validate
        deploy: config-types/zia-url-filtering-rules/deploy
        rollback: config-types/zia-url-filtering-rules/rollback
        healthCheck: config-types/zia-url-filtering-rules/healthCheck
        driftDetect: config-types/zia-url-filtering-rules/driftDetect
        getStatus: config-types/zia-url-filtering-rules/getStatus
      targets:
        componentTypes: [zscaler-tenant]
        requiresCredential: true
        requiresConnectivity: false

    - id: zia-url-categories

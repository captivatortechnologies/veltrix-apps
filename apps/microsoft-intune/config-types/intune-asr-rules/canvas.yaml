          fieldType: "select"
          defaultValue: "notconfigured"
          options:
            - { label: "Not configured", value: "notconfigured" }
            - { label: "Off", value: "off" }
            - { label: "Block", value: "block" }
            - { label: "Audit", value: "audit" }
            - { label: "Warn", value: "warn" }
        - key: "block_office_comm_child_process"
          label: "Block Office communication apps from creating child processes"
          fieldType: "select"
          defaultValue: "notconfigured"
          options:
            - { label: "Not configured", value: "notconfigured" }
            - { label: "Off", value: "off" }
            - { label: "Block", value: "block" }
            - { label: "Audit", value: "audit" }
            - { label: "Warn", value: "warn" }
        - key: "block_adobe_child_process"
          label: "Block Adobe Reader from creating child processes"
          fieldType: "select"
          defaultValue: "notconfigured"
          options:
            - { label: "Not configured", value: "notconfigured" }
            - { label: "Off", value: "off" }
            - { label: "Block", value: "block" }
            - { label: "Audit", value: "audit" }
            - { label: "Warn", value: "warn" }
        - key: "block_wmi_persistence"
          label: "Block persistence through WMI event subscription"
          fieldType: "select"
          defaultValue: "notconfigured"

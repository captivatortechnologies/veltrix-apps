        - key: "block_safemode_reboot"
          label: "Block rebooting machine in Safe Mode"
          fieldType: "select"
          defaultValue: "notconfigured"
          options:
            - { label: "Not configured", value: "notconfigured" }
            - { label: "Off", value: "off" }
            - { label: "Block", value: "block" }
            - { label: "Audit", value: "audit" }
            - { label: "Warn", value: "warn" }
        - key: "block_impersonated_system_tools"
          label: "Block use of copied or impersonated system tools"
          fieldType: "select"
          defaultValue: "notconfigured"
          options:
            - { label: "Not configured", value: "notconfigured" }
            - { label: "Off", value: "off" }
            - { label: "Block", value: "block" }
            - { label: "Audit", value: "audit" }
            - { label: "Warn", value: "warn" }

    - name: "Exclusions"
      icon: "folder"
      description: "Optional files/folders excluded from all ASR rules"
      fields:
        - key: "exclusions"
          label: "ASR exclusions"
          fieldType: "tags"
          helpText: >
            Optional file or folder paths excluded from every ASR rule in this
            policy (e.g. a management-agent executable path). Leave blank for none.

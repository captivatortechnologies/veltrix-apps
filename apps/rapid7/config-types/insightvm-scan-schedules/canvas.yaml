# =============================================================================
# Canvas Template — Rapid7 InsightVM Scan Schedules
#
# Declares ONE per-site scan schedule — the item. A scan schedule is a CHILD of a
# site: the handler resolves the site by name, then manages the schedule under it
# (/sites/{id}/scan_schedules). Identity is (site name, schedule name); the
# schedule name is stored as the triggered scans' name (scanName). Field keys
# must match config-types/insightvm-scan-schedules/validate.ts.
# =============================================================================

id: "rapid7-insightvm-scan-schedules"
name: "InsightVM Scan Schedule Configuration"
toolType: "rapid7"
entityType: "insightvm-scan-schedules"
description: "Define Rapid7 InsightVM per-site scan schedules as code (/sites/{id}/scan_schedules). The site is referenced by name."

item:
  label: "Scan Schedule"
  identityField: "schedule_name"
  repeatable: true
  minItems: 1
  maxItems: 200
  groups:
    - name: "Scan Schedule"
      icon: "calendar"
      description: "Site, name and schedule"
      fields:
        - key: "site_name"
          label: "Site Name"
          fieldType: "text"
          required: true
          helpText: "The name of the site this schedule belongs to. The site must already exist."

        - key: "schedule_name"
          label: "Schedule Name"
          fieldType: "text"
          required: true
          helpText: "A name for this schedule (stored as the triggered scans' name; part of the identity)."

        - key: "enabled"
          label: "Enabled"
          fieldType: "checkbox"
          defaultValue: true
          helpText: "Whether the schedule is active."

        - key: "schedule_json"
          label: "Schedule (JSON)"
          fieldType: "textarea"
          required: true
          helpText: >
            JSON object with the schedule details, e.g.
            {"start":"2026-08-01T02:00:00Z","duration":"PT8H","repeat":{"every":"week","interval":1},"scanTemplateId":"full-audit-without-web-spider"}.

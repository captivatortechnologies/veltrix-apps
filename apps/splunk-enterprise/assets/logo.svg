<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 40" width="168" height="40" role="img" aria-label="Splunk">
  <!-- "splunk>" wordmark identifying this Splunk integration (original SVG art,
       not the vendor's trademark typeface). The signature chevron uses Splunk
       brand orange (#FF6600); the wordmark inherits the navbar's text color via
       currentColor so it reads in both light and dark app shells. -->
  <text x="4" y="29" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5" fill="currentColor">splunk<tspan dx="1" fill="#FF6600" font-weight="800">&gt;</tspan></text>
</svg>

id: splunk-enterprise
name: Splunk Enterprise
version: "1.14.1"
vendor: Veltrix
description: >
  Manage Splunk Enterprise configurations as code.
  Author Splunk apps and add-ons (including their .conf files),
  HTTP Event Collector tokens, BYOL infrastructure, and version
  tracking for current Splunk release lines (9.4.x–10.4.x).
  Configuration ships the way Splunk ships it — inside an app —
  so indexes and roles are authored as indexes.conf / authorize.conf
  in the App Contents of a Splunk App.
category: SIEM
license: Apache-2.0
homepage: https://github.com/captivatortechnologies/veltrix-apps/tree/main/apps/splunk-enterprise
icon: "🔍"

platform:
  minVersion: "1.0.0"

# Rendered by the platform in the app's navbar and exposed to pages as
# --veltrix-app-primary / --veltrix-app-accent. Splunk brand orange (#FF6600)
# is the primary; a warm amber accent from Splunk's pink→orange→yellow brand
# gradient completes the palette. The official Splunk "splunk> a Cisco company"
# lockup ships in assets/ as light + dark variants.
branding:
  primaryColor: "#FF6600"
  accentColor: "#F8BF1C"
  logo: ./assets/logo.png
  logoDark: ./assets/logo-dark.png

permissions:
  platform:
    - configuration-canvas:read
    - configuration-canvas:write
    - component:read
    - credential:read
  app:
    - resource: hec-tokens
      actions: [read, write, delete]
      description: Manage HTTP Event Collector token configurations
    - resource: byol
      actions: [read, write, delete]
      description: Manage BYOL infrastructure
    - resource: versions
      actions: [read, write, delete]
      description: Manage Splunk versions and upgrades
    - resource: apps
      actions: [read, write, delete]
      description: Manage Splunk apps and add-ons, including the .conf files they ship
    - resource: usage
      actions: [read, write]
      description: Read BYOL infrastructure usage metering and run the daily usage collector

database:
  migrations: migrations
  tablePrefix: splunk_

pipeline:
  configurationTypes:
    - id: hec-tokens
      name: HEC Tokens
      description: HTTP Event Collector token definitions (routing, allowed indexes, acknowledgment)
      canvasTemplate: config-types/hec-tokens/canvas.yaml
      defaultConfig: config-types/hec-tokens/defaults.yaml
      handlers:
        validate: config-types/hec-tokens/validate
        deploy: config-types/hec-tokens/deploy
        rollback: config-types/hec-tokens/rollback
        healthCheck: config-types/hec-tokens/healthCheck
        driftDetect: config-types/hec-tokens/driftDetect
        getStatus: config-types/hec-tokens/getStatus
      targets:
        componentTypes: [indexer, heavy-forwarder]
        requiresCredential: true
        requiresConnectivity: true

    # Splunk ships configuration AS AN APP. Everything a .conf file needs to say
    # is authored in this type's "App Contents" (default/*.conf, bin/, metadata/,
    # lookups/, README/) and installed as a real .spl package — so there is no
    # separate "config files" type writing loose stanzas into someone else's
    # local/ over the REST configs API.
    - id: apps
      name: Splunk Apps
      description: Splunk apps and add-ons — install source, version, visibility, state, upgrade policy, and the .conf files/scripts the app ships
      canvasTemplate: config-types/apps/canvas.yaml
      defaultConfig: config-types/apps/defaults.yaml
      handlers:
        validate: config-types/apps/validate
        deploy: config-types/apps/deploy
        rollback: config-types/apps/rollback
        healthCheck: config-types/apps/healthCheck
        driftDetect: config-types/apps/driftDetect
        getStatus: config-types/apps/getStatus
      targets:
        # An app is the delivery vehicle for configuration, so it must reach every
        # Splunk role that carries configuration — heavy forwarders (inputs/props)
        # and the cluster manager (indexes.conf) included.
        componentTypes: [search-head, indexer, deployment-server, heavy-forwarder, cluster-manager]
        requiresCredential: true
        requiresConnectivity: true

  pipelineEvents:
    - canvas:validated
    - canvas:deployed
    - canvas:rollback
    - drift:detected

server:
  entry: server/index
  routes:
    prefix: /api/apps/splunk-enterprise

client:
  entry: client/index
  # Sidebar layout: the app has many pages + configuration types, more than a
  # tab strip holds cleanly (matches crowdstrike-edr).
  navLayout: sidebar
  pages:
    - path: /overview
      component: OverviewPage
      label: Overview
      icon: home
      nav: sidebar
      order: 1
      layout: standard
    - path: /setup
      component: SetupGuidePage
      label: Setup Guide
      icon: book
      nav: sidebar
      order: 2
      layout: standard
    # Access Servers — app-level Settings item (Settings nav group).
    - path: /access-servers
      component: AccessServersPage
      label: "Access Servers"
      icon: shield
      nav: sidebar
      group: settings
      order: 1
      layout: standard
    # Connections — app-level Settings item (Settings nav group). Pairs each
    # Splunk server (component) with the credential used to reach it.
    - path: /connections
      component: ConnectionsPage
      label: Connections
      icon: link
      nav: sidebar
      group: settings
      order: 2
      layout: standard
    - path: /byol
      component: BYOLPage
      label: BYOL Infrastructure
      icon: server
      nav: sidebar
      group: page
      order: 8
      layout: standard
    # Upgrades hosts two in-page tabs: available Splunk versions (reference)
    # and planned/running upgrades. The former /versions page was consolidated
    # here so version tracking and upgrade planning live in one surface.
    - path: /upgrades
      component: UpgradesPage
      label: Upgrades
      icon: refresh-cw
      nav: sidebar
      group: page
      order: 9
      layout: standard

hooks:
  onInstall: hooks/onInstall
  onUninstall: hooks/onUninstall
  onWebhook: hooks/onWebhook
  onEvent: hooks/onEvent

settings:
  - key: splunk_api_port
    type: number
    label: Splunk Management Port
    description: Default management port for Splunk instances
    default: 8089
    required: false
  - key: default_retention_days
    type: number
    label: Default Retention (days)
    description: Default data retention period for new indexes
    default: 90
    required: false
  - key: enable_tsidx_reduction
    type: boolean
    label: Enable TSIDX Reduction
    description: Enable TSIDX reduction for new indexes by default
    default: false
    required: false

events:
  - component:created
  - component:deleted
  - credential:updated

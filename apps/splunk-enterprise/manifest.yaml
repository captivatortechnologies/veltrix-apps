id: splunk-enterprise
name: Splunk Enterprise
version: 1.2.0
vendor: Veltrix
description: >
  Manage Splunk Enterprise configurations as code.
  Includes indexes, roles, HTTP Event Collector tokens,
  BYOL infrastructure, and version tracking for current
  Splunk release lines (9.4.x–10.4.x).
category: SIEM
license: Apache-2.0
homepage: https://github.com/captivatortechnologies/veltrix-apps/tree/main/apps/splunk-enterprise
icon: "🔍"

platform:
  minVersion: "1.0.0"

permissions:
  platform:
    - configuration-canvas:read
    - configuration-canvas:write
    - component:read
    - credential:read
  app:
    - resource: indexes
      actions: [read, write, delete]
      description: Manage Splunk index configurations
    - resource: roles
      actions: [read, write, delete]
      description: Manage Splunk role configurations
    - resource: hec-tokens
      actions: [read, write, delete]
      description: Manage HTTP Event Collector token configurations
    - resource: byol
      actions: [read, write, delete]
      description: Manage BYOL infrastructure
    - resource: versions
      actions: [read, write]
      description: Manage Splunk versions and upgrades

database:
  migrations: migrations
  tablePrefix: splunk_

pipeline:
  configurationTypes:
    - id: indexes
      name: Index Configuration
      description: Splunk Enterprise index definitions (retention, sizing, compression)
      canvasTemplate: config-types/indexes/canvas.yaml
      defaultConfig: config-types/indexes/defaults.yaml
      handlers:
        validate: config-types/indexes/validate
        deploy: config-types/indexes/deploy
        rollback: config-types/indexes/rollback
        healthCheck: config-types/indexes/healthCheck
        driftDetect: config-types/indexes/driftDetect
        getStatus: config-types/indexes/getStatus
      targets:
        componentTypes: [indexer, cluster-manager]
        requiresCredential: true
        requiresConnectivity: true

    - id: roles
      name: Role Configuration
      description: Splunk Enterprise role definitions (capabilities, search filters)
      canvasTemplate: config-types/roles/canvas.yaml
      defaultConfig: config-types/roles/defaults.yaml
      handlers:
        validate: config-types/roles/validate
        deploy: config-types/roles/deploy
        rollback: config-types/roles/rollback
        healthCheck: config-types/roles/healthCheck
        driftDetect: config-types/roles/driftDetect
        getStatus: config-types/roles/getStatus
      targets:
        componentTypes: [search-head, cluster-manager]
        requiresCredential: true
        requiresConnectivity: true

    - id: hec-tokens
      name: HEC Token Configuration
      description: HTTP Event Collector token definitions (routing, allowed indexes, acknowledgment)
      canvasTemplate: config-types/hec-tokens/canvas.yaml
      defaultConfig: config-types/hec-tokens/defaults.yaml
      handlers:
        validate: config-types/hec-tokens/validate
        deploy: config-types/hec-tokens/deploy
        rollback: config-types/hec-tokens/rollback
        healthCheck: config-types/hec-tokens/healthCheck
        driftDetect: config-types/hec-tokens/driftDetect
        getStatus: config-types/hec-tokens/getStatus
      targets:
        componentTypes: [indexer, heavy-forwarder]
        requiresCredential: true
        requiresConnectivity: true

  pipelineEvents:
    - canvas:validated
    - canvas:deployed
    - canvas:rollback
    - drift:detected

server:
  entry: server/index
  routes:
    prefix: /api/apps/splunk-enterprise

client:
  entry: client/index
  pages:
    - path: /indexes
      component: IndexesPage
      label: Indexes
      icon: database
      nav: sidebar
      order: 1
      layout: standard
    - path: /roles
      component: RolesPage
      label: Roles
      icon: shield
      nav: sidebar
      order: 2
      layout: standard
    - path: /byol
      component: BYOLPage
      label: BYOL Infrastructure
      icon: server
      nav: sidebar
      order: 3
      layout: standard

hooks:
  onInstall: hooks/onInstall
  onUninstall: hooks/onUninstall

settings:
  - key: splunk_api_port
    type: number
    label: Splunk Management Port
    description: Default management port for Splunk instances
    default: 8089
    required: false
  - key: default_retention_days
    type: number
    label: Default Retention (days)
    description: Default data retention period for new indexes
    default: 90
    required: false
  - key: enable_tsidx_reduction
    type: boolean
    label: Enable TSIDX Reduction
    description: Enable TSIDX reduction for new indexes by default
    default: false
    required: false

events:
  - component:created
  - component:deleted
  - credential:updated

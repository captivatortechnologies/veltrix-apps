# =============================================================================
# Canvas Template — Splunk Enterprise HTTP Event Collector Tokens
#
# Declares ONE token — the item. Users add as many tokens as they need.
# Groups are PRESENTATIONAL ONLY: every field below belongs to the same flat
# item record, which is what config-types/hec-tokens/deploy.ts reads as
# `section.fields` for a single token.
#
# Field keys must match what config-types/hec-tokens/validate.ts checks and
# what config-types/hec-tokens/deploy.ts maps to Splunk REST parameters
# (/servicesNS/admin/splunk_httpinput/data/inputs/http).
#
# NOTE: The token VALUE is generated by Splunk on creation and is never
# stored on the canvas — read it from the Splunk instance after deploy.
# =============================================================================

id: "splunk-enterprise-hec-tokens"
name: "HEC Token Configuration"
toolType: "splunk-enterprise"
entityType: "hec-tokens"
description: "Define HTTP Event Collector tokens (routing, allowed indexes, acknowledgment) as code"

item:
  label: "HEC Token"
  identityField: "name"
  repeatable: true
  minItems: 1
  maxItems: 100
  groups:
    - name: "General"
      icon: "key"
      description: "Token identity"
      fields:
        - key: "name"
          label: "Token Name"
          fieldType: "text"
          required: true
          validation:
            pattern: "^[A-Za-z0-9][A-Za-z0-9_.-]*$"
            maxLength: 80
            message: "Letters, digits, underscores, dots, and hyphens only; must start with a letter or digit."
          helpText: "Unique token name. The token secret is generated by Splunk on creation."

        - key: "description"
          label: "Description"
          fieldType: "text"
          helpText: "What sends data through this token"

        - key: "enabled"
          label: "Enabled"
          fieldType: "checkbox"
          defaultValue: true
          helpText: "Disabled tokens reject all events"

    - name: "Routing"
      icon: "git-branch"
      description: "Where events land"
      fields:
        - key: "defaultIndex"
          label: "Default Index"
          fieldType: "remote-select"
          optionsSource: "indexes"
          validation:
            pattern: "^[a-z0-9][a-z0-9_-]*$"
          helpText: "Index used when events do not specify one. Search the connected instance's live indexes and pick one (the index name is stored). Must be in the allowed indexes list when that list is set."

        - key: "allowedIndexes"
          label: "Allowed Indexes"
          fieldType: "remote-multiselect"
          optionsSource: "indexes"
          optionsMulti: true
          helpText: "Indexes this token may write to (maps to 'indexes'). Search the connected instance's live indexes and select one or more (the index names are stored). Leaving it empty allows any index the HEC user can access and triggers a review warning."

        - key: "defaultSourcetype"
          label: "Default Sourcetype"
          fieldType: "text"
          helpText: "Sourcetype applied when events do not specify one"

        - key: "defaultSource"
          label: "Default Source"
          fieldType: "text"
          helpText: "Source applied when events do not specify one"

    - name: "Reliability"
      icon: "check-circle"
      description: "Delivery guarantees"
      fields:
        - key: "useACK"
          label: "Indexer Acknowledgment"
          fieldType: "checkbox"
          defaultValue: false
          helpText: "Clients must track ackIds and re-send unacknowledged events (maps to useACK). Enable for pipelines that cannot lose data."

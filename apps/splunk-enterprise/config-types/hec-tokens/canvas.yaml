# =============================================================================
# Canvas Template — Splunk Enterprise HTTP Event Collector Tokens
#
# Fields shown in the Configuration Canvas editor for HEC token
# configurations. Field keys must match what config-types/hec-tokens/validate.ts
# checks and what config-types/hec-tokens/deploy.ts maps to Splunk REST
# parameters (/servicesNS/admin/splunk_httpinput/data/inputs/http).
#
# NOTE: The token VALUE is generated by Splunk on creation and is never
# stored on the canvas — read it from the Splunk instance after deploy.
# =============================================================================

id: "splunk-enterprise-hec-tokens"
name: "HEC Token Configuration"
toolType: "splunk-enterprise"
entityType: "hec-tokens"
description: "Define HTTP Event Collector tokens (routing, allowed indexes, acknowledgment) as code"

sections:
  - name: "General"
    icon: "key"
    description: "Token identity"
    fields:
      - key: "name"
        label: "Token Name"
        fieldType: "text"
        required: true
        validation:
          pattern: "^[A-Za-z0-9][A-Za-z0-9_.-]*$"
          maxLength: 80
          message: "Letters, digits, underscores, dots, and hyphens only; must start with a letter or digit."
        helpText: "Unique token name. The token secret is generated by Splunk on creation."

      - key: "description"
        label: "Description"
        fieldType: "text"
        helpText: "What sends data through this token"

      - key: "enabled"
        label: "Enabled"
        fieldType: "checkbox"
        defaultValue: true
        helpText: "Disabled tokens reject all events"

  - name: "Routing"
    icon: "git-branch"
    description: "Where events land"
    fields:
      - key: "defaultIndex"
        label: "Default Index"
        fieldType: "text"
        validation:
          pattern: "^[a-z0-9][a-z0-9_-]*$"
        helpText: "Index used when events do not specify one. Must be in the allowed indexes list when that list is set."

      - key: "allowedIndexes"
        label: "Allowed Indexes"
        fieldType: "tags"
        helpText: "Indexes this token may write to (maps to 'indexes'). Leaving it empty allows any index the HEC user can access and triggers a review warning."

      - key: "defaultSourcetype"
        label: "Default Sourcetype"
        fieldType: "text"
        helpText: "Sourcetype applied when events do not specify one"

      - key: "defaultSource"
        label: "Default Source"
        fieldType: "text"
        helpText: "Source applied when events do not specify one"

  - name: "Reliability"
    icon: "check-circle"
    description: "Delivery guarantees"
    fields:
      - key: "useACK"
        label: "Indexer Acknowledgment"
        fieldType: "checkbox"
        defaultValue: false
        helpText: "Clients must track ackIds and re-send unacknowledged events (maps to useACK). Enable for pipelines that cannot lose data."

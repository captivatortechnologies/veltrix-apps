# =============================================================================
# Canvas Template — Splunk Enterprise Apps & Add-ons
#
# Declares ONE app/add-on — the item. Users add as many as they manage.
# Groups are PRESENTATIONAL ONLY: every field below belongs to the same flat
# item record, which is what config-types/apps/deploy.ts reads as
# `section.fields` for a single app.
#
# This is ALSO where .conf files are authored: Splunk ships configuration as an
# app, so `appFiles` (App Contents) carries default/*.conf, bin/ scripts,
# metadata/, lookups/ and README/ specs, and deploy builds them into a real .spl
# that is installed. There is no separate "config files" type — loose stanzas
# written over the REST configs API land in the target app's user-owned local/,
# which shadows default/ and survives every upgrade.
#
# Field keys must match what config-types/apps/validate.ts checks and what
# config-types/apps/deploy.ts maps to the Splunk apps REST endpoints
# (/services/apps/local, /services/apps/appinstall, .../acl).
# =============================================================================

id: "splunk-enterprise-apps"
name: "Splunk App Configuration"
toolType: "splunk-enterprise"
entityType: "apps"
description: "Define Splunk apps and add-ons as code — install source, version, visibility, state, upgrade policy, and the .conf files, scripts and lookups the app ships"

item:
  label: "App"
  identityField: "name"
  # Blank App ID is intended: the app is named after the configuration.
  identityDerived: true
  repeatable: true
  minItems: 1
  maxItems: 200
  groups:
    - name: "General"
      icon: "package"
      description: "App identity"
      fields:
        - key: "name"
          label: "App ID"
          fieldType: "text"
          validation:
            pattern: "^[A-Za-z0-9][A-Za-z0-9_-]*$"
            maxLength: 128
            message: "Letters, digits, underscores, and hyphens only; must start with a letter or digit. This is the app's folder name in $SPLUNK_HOME/etc/apps."
          helpText: "Optional — defaults to this configuration's name. The configuration IS the app: the files below ship as an app of this id, so authoring .conf files does not mean inventing a separate id. Set one explicitly to target an existing app (the deploy installs a package, so it REPLACES that app's default/ — it never touches local/, the user's own override layer), or when this configuration declares more than one app, since they would otherwise all derive the same id."

        - key: "label"
          label: "Display Name"
          fieldType: "text"
          helpText: "Human-readable name shown in Splunk Web (maps to the app 'label')."

        - key: "description"
          label: "Description"
          fieldType: "text"
          helpText: "What this app or add-on provides."

    - name: "Source"
      icon: "download"
      description: "Where the package comes from"
      fields:
        - key: "source"
          label: "Install Source"
          fieldType: "select"
          defaultValue: "splunkbase"
          options:
            - value: "splunkbase"
              label: "Splunkbase (by app ID)"
            - value: "url"
              label: "Package URL (https)"
            - value: "local"
              label: "Local package path"
            - value: "inline"
              label: "Author files inline (build the app/TA)"
          helpText: "How the platform installs/upgrades the package on the target. Choose 'Author files inline' to BUILD the app/TA from the App Contents below — that is how .conf files are shipped: they are packaged into the app's default/ and installed as a real .spl."

        - key: "sourceRef"
          label: "Source Reference"
          fieldType: "text"
          helpText: "Splunkbase numeric app id (source=Splunkbase), an https URL to the .tgz/.spl (source=Package URL), or an absolute file path on the target (source=Local). Not required when authoring files inline."

        - key: "version"
          label: "Version / Build"
          fieldType: "text"
          validation:
            maxLength: 64
          helpText: "Target version to pin (maps to the app 'version'). Leave blank to accept whatever the package provides."

    - name: "Deployment"
      icon: "server"
      description: "Placement and lifecycle"
      fields:
        - key: "targetTypes"
          label: "Target Server Types"
          fieldType: "multiselect"
          options:
            - { value: "indexer", label: "Indexer" }
            - { value: "search-head", label: "Search Head" }
            - { value: "cluster-manager", label: "Cluster Manager" }
            - { value: "heavy-forwarder", label: "Heavy Forwarder" }
            - { value: "universal-forwarder", label: "Universal Forwarder" }
            - { value: "deployment-server", label: "Deployment Server" }
            - { value: "deployer", label: "Deployer" }
            - { value: "license-server", label: "License Server" }
            - { value: "sc4s", label: "SC4S" }
          helpText: "Splunk roles this app belongs on. Informs where the pipeline deploys. Same roles as an Access Server's Type."

        - key: "cmInstallDirs"
          label: "Cluster Manager — install directory"
          fieldType: "multiselect"
          visibleWhen:
            field: "targetTypes"
            includes: "cluster-manager"
          options:
            - { value: "etc/manager-apps", label: "etc/manager-apps (staged; pushed to indexer peers)" }
            - { value: "etc/apps", label: "etc/apps (local to the Cluster Manager)" }
          helpText: "Where the app is placed on the Cluster Manager. etc/manager-apps is staged and distributed to indexer peers via 'apply cluster-bundle'; etc/apps installs it locally on the CM. Select both if needed."

        - key: "dsInstallDirs"
          label: "Deployment Server — install directory"
          fieldType: "multiselect"
          visibleWhen:
            field: "targetTypes"
            includes: "deployment-server"
          options:
            - { value: "etc/deployment-apps", label: "etc/deployment-apps (distributed to deployment clients)" }
            - { value: "etc/apps", label: "etc/apps (local to the Deployment Server)" }
          helpText: "Where the app is placed on the Deployment Server. etc/deployment-apps is distributed to deployment clients via serverclasses; etc/apps installs it locally. Select both if needed."

        - key: "deployerInstallDirs"
          label: "Deployer — install directory"
          fieldType: "multiselect"
          visibleWhen:
            field: "targetTypes"
            includes: "deployer"
          options:
            - { value: "etc/shcluster/apps", label: "etc/shcluster/apps (pushed to SHC members)" }
            - { value: "etc/apps", label: "etc/apps (local to the Deployer)" }
          helpText: "Where the app is placed on the Deployer. etc/shcluster/apps is distributed to search head cluster members via 'apply shcluster-bundle'; etc/apps installs it locally. Select both if needed."

        - key: "indexerInstallDirs"
          label: "Indexer — install directory"
          fieldType: "multiselect"
          visibleWhen:
            field: "targetTypes"
            includes: "indexer"
          options:
            - { value: "etc/peer-apps", label: "etc/peer-apps (cluster peer bundle location)" }
            - { value: "etc/apps", label: "etc/apps (local to the Indexer)" }
          helpText: "Where the app is placed on the Indexer. etc/peer-apps is the location a clustered peer receives its bundle in (normally managed by the Cluster Manager); etc/apps installs it locally. Select both if needed."

        - key: "visibility"
          label: "Visibility"
          fieldType: "select"
          defaultValue: "app"
          options:
            - value: "app"
              label: "App-local (sharing=app)"
            - value: "global"
              label: "Global (sharing=global)"
          helpText: "ACL sharing scope. App-local keeps the app's knowledge objects private to it; Global exposes them to all apps."

        - key: "state"
          label: "State"
          fieldType: "select"
          defaultValue: "enabled"
          options:
            - value: "enabled"
              label: "Enabled"
            - value: "disabled"
              label: "Disabled"
          helpText: "Disabled apps remain installed but inactive (maps to the enable/disable endpoints)."

        - key: "upgradePolicy"
          label: "Upgrade Policy"
          fieldType: "select"
          defaultValue: "manual"
          options:
            - value: "manual"
              label: "Manual (pin version; upgrade only on redeploy)"
            - value: "auto"
              label: "Automatic (install the latest available on deploy)"
          helpText: "Manual keeps the pinned version; Automatic re-installs the latest package from the source on every deploy."

    - name: "App Contents"
      icon: "folder-tree"
      description: "Author this app's .conf files and assets — its folder structure. Splunk ships configuration as an app, so this is where indexes.conf, inputs.conf, props/transforms, authorize.conf and everything else live (used when Install Source is 'Author files inline')."
      fields:
        - key: "appFiles"
          label: "Files"
          fieldType: "files"
          options:
            - value: "default"
              label: "default/"
            - value: "local"
              label: "local/"
            - value: "bin"
              label: "bin/"
            - value: "static"
              label: "static/"
            - value: "metadata"
              label: "metadata/"
            - value: "lookups"
              label: "lookups/"
            - value: "lib"
              label: "lib/"
            - value: "README"
              label: "README/"
          fileCatalog:
            - value: "app.conf"
              description: "Configure app properties (label, version, visibility, launcher)"
              template: |
                # app.conf — app properties shown in Splunk Web
                [install]
                is_configured = false

                [ui]
                is_visible = true
                label = My App

                [launcher]
                author =
                description =
                version = 1.0.0
            - value: "inputs.conf"
              description: "Set up data inputs (monitors, scripted/modular inputs, TCP/UDP)"
              template: |
                # inputs.conf — data inputs
                [monitor:///var/log/example.log]
                disabled = false
                index = main
                sourcetype = example
            - value: "props.conf"
              description: "Indexing properties: timestamps, line breaking, sourcetype rules; map transforms to events"
              template: |
                # props.conf — parsing/indexing properties per sourcetype
                [example]
                SHOULD_LINEMERGE = false
                LINE_BREAKER = ([\r\n]+)
                TIME_FORMAT = %Y-%m-%d %H:%M:%S
                MAX_TIMESTAMP_LOOKAHEAD = 25
                TRUNCATE = 10000
            - value: "transforms.conf"
              description: "Regex transformations for data inputs (use with props.conf)"
              template: |
                # transforms.conf — regex transforms (reference from props.conf)
                [example_transform]
                REGEX = (?<field>\w+)
                FORMAT = field::$1
                DEST_KEY = _raw
            - value: "indexes.conf"
              description: "Manage and configure index settings"
              template: |
                # indexes.conf — index definitions
                # [default] applies to every index stanza below (shared baseline).
                [default]
                maxTotalDataSizeMB = 500000          # freeze oldest buckets past this size
                frozenTimePeriodInSecs = 7776000     # 90 days; frozen buckets are DELETED unless coldToFrozenDir is set
                maxDataSize = auto                   # auto (750MB) | auto_high_volume (10GB) | <MB>
                journalCompression = zstd            # better ratio than gzip; recommended for indexes >100 GB

                [example_index]
                datatype   = event                   # event | metric (set at creation time only)
                homePath   = $SPLUNK_DB/example_index/db
                coldPath   = $SPLUNK_DB/example_index/colddb
                thawedPath = $SPLUNK_DB/example_index/thaweddb
                # coldToFrozenDir = /archive/example_index      # archive frozen buckets instead of deleting
                # enableTsidxReduction = 1                       # shrink tsidx on older buckets to save disk
                # timePeriodInSecBeforeTsidxReduction = 2592000  # bucket age (30d) before reduction applies
            - value: "outputs.conf"
              description: "Set up forwarding behavior"
              template: |
                # outputs.conf — forwarding behavior
                [tcpout]
                defaultGroup = primary_indexers

                [tcpout:primary_indexers]
                server = indexer1:9997,indexer2:9997
            - value: "server.conf"
              description: "Overall instance settings: SSL, clustering, KV store, license manager"
              template: |
                # server.conf — instance-wide settings
                [general]
                serverName = my-splunk

                [sslConfig]
                enableSplunkdSSL = true
            - value: "web.conf"
              description: "Configure Splunk Web; enable HTTPS"
              template: |
                # web.conf — Splunk Web settings
                [settings]
                enableSplunkWebSSL = true
                httpport = 8000
            - value: "authentication.conf"
              description: "Built-in authentication or LDAP, and LDAP configuration"
              template: |
                # authentication.conf — authentication method
                [authentication]
                authType = Splunk
            - value: "authorize.conf"
              description: "Configure roles, including granular access controls"
              template: |
                # authorize.conf — roles and capabilities
                # [default] applies to every role stanza below (shared quotas).
                [default]
                srchDiskQuota = 100        # MB of disk for a user's search jobs (0 = unlimited)
                srchJobsQuota = 3          # concurrent historical searches per user
                rtSrchJobsQuota = 6        # concurrent real-time searches per user

                [role_example]
                importRoles = user                    # inherit capabilities from these roles
                srchIndexesAllowed = main             # searchable indexes (wildcards supported)
                srchIndexesDefault = main             # searched when a query names no index
                # srchFilter = index=main             # SPL filter applied to every search this role runs
                # srchTimeWin = -1                    # max search time span in secs (-1 = unset)
                # defaultApp = search                 # app users with this role land in
                # schedule_search = enabled           # grant a capability: <capability> = enabled
            - { value: "alert_actions.conf", description: "Create an alert action" }
            - value: "savedsearches.conf"
              description: "Define reports, scheduled reports, and alerts"
              template: |
                # savedsearches.conf — reports, scheduled searches, alerts
                [Example Search]
                search = index=main error
                dispatch.earliest_time = -24h
                dispatch.latest_time = now
                enableSched = 0
            - value: "macros.conf"
              description: "Define search macros"
              template: |
                # macros.conf — search macros
                [example_macro(1)]
                args = index
                definition = index=$index$
            - value: "eventtypes.conf"
              description: "Create event type definitions"
              template: |
                # eventtypes.conf — event type definitions
                [example_eventtype]
                search = index=main sourcetype=example
            - value: "tags.conf"
              description: "Configure tags for fields"
              template: |
                # tags.conf — tags for fields
                [eventtype=example_eventtype]
                example = enabled
            - { value: "fields.conf", description: "Create multivalue fields; add search capability for indexed fields" }
            - { value: "datamodels.conf", description: "Attribute/value pairs for configuring data models" }
            - { value: "collections.conf", description: "Configure KV Store collections for apps" }
            - { value: "commands.conf", description: "Create custom search commands for apps" }
            - { value: "restmap.conf", description: "Create custom REST endpoints" }
            - { value: "limits.conf", description: "Set limits (e.g. max result size, concurrent real-time searches) for search commands" }
            - { value: "distsearch.conf", description: "Specify behavior for distributed search" }
            - { value: "deploymentclient.conf", description: "Specify behavior for clients of the deployment server" }
            - { value: "serverclass.conf", description: "Define deployment server classes" }
            - { value: "serverclass.seed.xml.conf", description: "Seed a deployment client with apps at start-up time" }
            - { value: "workflow_actions.conf", description: "Configure workflow actions" }
            - { value: "times.conf", description: "Define custom time ranges for the Search app" }
            - { value: "multikv.conf", description: "Extraction rules for table-like events (ps, netstat, ls)" }
            - { value: "segmenters.conf", description: "Configure segmentation" }
            - { value: "transactiontypes.conf", description: "Add additional transaction types for transaction search" }
            - { value: "event_renderers.conf", description: "Configure event-rendering properties" }
            - { value: "searchbnf.conf", description: "Configure the search assistant" }
            - { value: "ui-prefs.conf", description: "Change UI preferences for a view (e.g. default time range)" }
            - { value: "user-prefs.conf", description: "Per-user settings for Splunk Web" }
            - { value: "viewstates.conf", description: "Set up UI views (such as charts)" }
            - { value: "visualizations.conf", description: "List the visualizations an app makes available" }
            - { value: "global-banner.conf", description: "Display a global banner on all pages in Splunk Web" }
            - { value: "health.conf", description: "Set default thresholds for proactive component monitoring" }
            - { value: "checklist.conf", description: "Customize monitoring console health check" }
            - { value: "bookmarks.conf", description: "Bookmark monitoring console URLs" }
            - { value: "messages.conf", description: "Customize Splunk Web messages" }
            - { value: "literals.conf", description: "Customize text (e.g. search error strings) in Splunk Web" }
            - { value: "passwords.conf", description: "Maintain the credential information for an app" }
            - { value: "audit.conf", description: "Configure auditing and event hashing" }
            - { value: "telemetry.conf", description: "Enable apps to collect telemetry data" }
            - { value: "federated.conf", description: "Search data outside of your own Splunk platform deployment" }
            - { value: "metric_rollups.conf", description: "Metric rollup policy entries" }
            - { value: "source-classifier.conf", description: "Terms to ignore when creating a source type" }
            - { value: "sourcetypes.conf", description: "Machine-generated store of source type learning rules" }
            - { value: "procmon-filters.conf", description: "Monitor Windows process data" }
            - { value: "wmi.conf", description: "Set up Windows Management Instrumentation (WMI) inputs" }
            - { value: "pubsub.conf", description: "Define a custom client of the deployment server" }
            - { value: "rolling_upgrade.conf", description: "Automated search head / indexer cluster rolling upgrade" }
            - { value: "web-features.conf", description: "Configure some Splunk Web settings" }
            - { value: "workload_policy.conf", description: "Enable or disable admission rules in workload management" }
            - { value: "workload_pools.conf", description: "Configure workload pools (compute/memory resource groups)" }
            - { value: "workload_rules.conf", description: "Workload rules: access and priority for workload pools" }
            - { value: "agent_management.conf", description: "Configure the Agent Management feature" }
          helpText: "Configuration files (default/*.conf), scripts and commands (bin/), libraries (lib/), static assets (static/), lookups (lookups/) and .conf specs (README/). Pick a standard Splunk .conf file from the catalog (with descriptions) or type a custom name, then author its stanzas in Form or Text mode. On deploy every file here is packaged into a real .spl and installed, so .conf files ship in the app's default/ — the layer Splunk intends configuration to live in. Put .conf files in default/, never local/: local/ is the USER's override layer, it shadows default/ and survives every upgrade, so a package must never write it (validation rejects it). default/app.conf and metadata/default.meta are generated from the fields above — authoring them here has no effect."

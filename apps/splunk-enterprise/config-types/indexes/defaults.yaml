# Default values used when creating a new index configuration canvas

General:
  name: ""
  datatype: "event"

Sizing:
  maxDataSizeMB: 500000
  maxDataSizeMode: "auto"
  enableCompression: true

Retention:
  frozenTimeDays: 90
  coldToFrozenDir: ""
  retentionPeriod: 90
  searchablePeriod: 90
  enableTsidxReduction: false
  tsidxReductionPeriodDays: 30

Storage Paths:
  homePath: ""
  coldPath: ""
  thawedPath: ""

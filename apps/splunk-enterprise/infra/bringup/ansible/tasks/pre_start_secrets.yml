# =============================================================================
# pre_start_secrets.yml — MUST run BEFORE splunkd is first started on a node.
#
# Places, in order:
#   1. $SPLUNK_HOME/etc/auth/splunk.secret  (0600 splunk:splunk) — the per-tenant
#      splunk.secret. splunkd uses THIS to encrypt pass4SymmKey/passwords on
#      first start; it MUST exist before start or splunkd generates its own and
#      the cluster keys won't match across nodes.
#   2. $SPLUNK_HOME/etc/system/local/user-seed.conf with HASHED_PASSWORD — the
#      admin seed. NEVER plaintext argv/env; the hash comes from `splunk
#      hash-passwd` and is stored in Secrets Manager. Consumed + deleted on first
#      start (post_start_admin.yml removes it).
#
# Idempotent: skips seeding once splunk.secret already exists (node already
# initialized). Every task handling secret material sets no_log: true.
# =============================================================================
- name: Check whether this node was already initialized (splunk.secret present)
  ansible.builtin.stat:
    path: "{{ splunk_home }}/etc/auth/splunk.secret"
  register: _splunk_secret_stat

- name: Ensure auth + system/local directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: "0700"
  loop:
    - "{{ splunk_home }}/etc/auth"
    - "{{ splunk_home }}/etc/system/local"
  when: not _splunk_secret_stat.stat.exists

- name: Place per-tenant splunk.secret (0600) before first splunkd start
  ansible.builtin.copy:
    content: "{{ splunk_secret_value }}"
    dest: "{{ splunk_home }}/etc/auth/splunk.secret"
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: "0600"
  no_log: true
  when: not _splunk_secret_stat.stat.exists

- name: Seed admin with a HASHED password (user-seed.conf, 0600)
  ansible.builtin.copy:
    dest: "{{ splunk_home }}/etc/system/local/user-seed.conf"
    owner: "{{ splunk_user }}"
    group: "{{ splunk_group }}"
    mode: "0600"
    content: |
      [user_info]
      USERNAME = {{ splunk_admin_user }}
      HASHED_PASSWORD = {{ splunk_admin_hashed_password }}
  no_log: true
  when: not _splunk_secret_stat.stat.exists

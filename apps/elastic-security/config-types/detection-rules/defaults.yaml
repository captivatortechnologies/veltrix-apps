# Defaults for a new detection-rule item.
#
# Intentionally empty: the platform no longer seeds system default values into a
# new item — it starts blank. Users manage their own default value sets and can
# apply one when creating an item. Any values here would be a FLAT map keyed by
# the canvas field keys (rule_id, name, enabled, ruleJson), since a rule's
# presentational groups ("Rule", "Definition") share one flat item record.
#
# Deliberately NOT seeding ruleJson: the rule body is per-type (query / eql /
# esql / threshold / ml / threat_match / new_terms) and there is no single safe
# default that would apply across types.

    - id: brands
      group: "Branding & Notifications"
      name: Brands
      description: Brands and their single theme (colors + touchpoint variants; the default brand is protected from deletion; logos out of scope)
      canvasTemplate: config-types/brands/canvas.yaml
      defaultConfig: config-types/brands/defaults.yaml
      handlers:
        validate: config-types/brands/validate
        deploy: config-types/brands/deploy
        rollback: config-types/brands/rollback
        healthCheck: config-types/brands/healthCheck
        driftDetect: config-types/brands/driftDetect
        getStatus: config-types/brands/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: email-domains
      group: "Branding & Notifications"
      name: Email Domains
      description: Custom email domains (sender display name / username updatable; domain/brand/subdomain immutable; DNS verification is external; delete blocked while in use)
      canvasTemplate: config-types/email-domains/canvas.yaml
      defaultConfig: config-types/email-domains/defaults.yaml
      handlers:
        validate: config-types/email-domains/validate
        deploy: config-types/email-domains/deploy
        rollback: config-types/email-domains/rollback
        healthCheck: config-types/email-domains/healthCheck
        driftDetect: config-types/email-domains/driftDetect
        getStatus: config-types/email-domains/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: sms-templates
      group: "Branding & Notifications"
      name: SMS Templates
      description: Custom SMS templates (SMS_VERIFY_CODE text + localized translations; 161-char cap)
      canvasTemplate: config-types/sms-templates/canvas.yaml
      defaultConfig: config-types/sms-templates/defaults.yaml
      handlers:
        validate: config-types/sms-templates/validate
        deploy: config-types/sms-templates/deploy
        rollback: config-types/sms-templates/rollback
        healthCheck: config-types/sms-templates/healthCheck
        driftDetect: config-types/sms-templates/driftDetect
        getStatus: config-types/sms-templates/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: rate-limit-settings
      group: "Network & Security"
      name: Rate Limit Settings
      description: Org rate-limit settings — admin notifications, per-client enforcement (default + per use case), warning threshold (singleton; update-only)
      canvasTemplate: config-types/rate-limit-settings/canvas.yaml
      defaultConfig: config-types/rate-limit-settings/defaults.yaml
      handlers:
        validate: config-types/rate-limit-settings/validate
        deploy: config-types/rate-limit-settings/deploy
        rollback: config-types/rate-limit-settings/rollback
        healthCheck: config-types/rate-limit-settings/healthCheck
        driftDetect: config-types/rate-limit-settings/driftDetect
        getStatus: config-types/rate-limit-settings/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

  pipelineEvents:
    - canvas:validated
    - canvas:deployed
    - canvas:rollback
    - drift:detected

server:
  entry: server/index
  routes:
    prefix: /api/apps/okta-identity

client:
  entry: client/index
  navLayout: sidebar
  pages:
    - path: /overview
      component: OverviewPage
      label: Overview
      icon: shield
      nav: sidebar
    - path: /setup
      component: SetupGuidePage
      label: Setup Guide
      icon: book
      nav: sidebar
    - path: /connections
      component: ConnectionsPage
      label: Connections
      icon: link
      nav: sidebar
      group: settings

hooks:
  onInstall: hooks/onInstall
  onUninstall: hooks/onUninstall

# Connection-level connectivity test: verifies a Connection's org domain + SSWS
# API token against the Okta Management API (GET /api/v1/org).
connectivity:
  testHandler: handlers/testConnection

settings:
  - key: request_timeout_seconds
    type: number
    label: Request Timeout (seconds)
    description: Per-request timeout for Okta API calls.
    default: 30
    required: false

id: okta-identity
name: Okta
version: "1.4.0"
vendor: Veltrix
description: >
  Manage Okta configuration as code through the Okta Management API. Covers
  policies and their rules, group rules, groups, network zones, trusted origins,
  behavior rules, authenticators, identity providers, event / inline hooks,
  authorization servers (scopes / claims / policies), applications and group
  assignments, plus security and IAM governance — ThreatInsight, log streams,
  device assurance policies, user types, and custom admin roles with resource
  sets — with validation, drift detection and rollback handled by the
  Security-as-Code pipeline.
category: IAM
license: Apache-2.0
homepage: https://github.com/captivatortechnologies/veltrix-apps/tree/main/apps/okta-identity
icon: "🔵"

platform:
  minVersion: "1.0.0"

# Okta brand: deep blue primary.
branding:
  primaryColor: "#00297A"
  accentColor: "#1662DD"
  logo: ./assets/logo.svg
  logoDark: ./assets/logo-dark.svg

permissions:
  platform:
    - configuration-canvas:read
    - component:read
    - credential:read
  app:
    - resource: policies
      actions: [read, write, delete]
      description: Manage Okta sign-on / password / MFA-enrollment policies and their rules
    - resource: group-rules
      actions: [read, write, delete]
      description: Manage Okta dynamic group-assignment rules
    - resource: groups
      actions: [read, write, delete]
      description: Manage Okta groups (OKTA_GROUP) and their memberships
    - resource: network-zones
      actions: [read, write, delete]
      description: Manage Okta network zones (IP and dynamic)
    - resource: trusted-origins
      actions: [read, write, delete]
      description: Manage Okta trusted origins
    - resource: behavior-rules
      actions: [read, write, delete]
      description: Manage Okta behavior detection rules
    - resource: authenticators
      actions: [read, write, delete]
      description: Manage Okta authenticators
    - resource: idps
      actions: [read, write, delete]
      description: Manage Okta identity providers
    - resource: event-hooks
      actions: [read, write, delete]
      description: Manage Okta event hooks
    - resource: inline-hooks
      actions: [read, write, delete]
      description: Manage Okta inline hooks
    - resource: authorization-servers
      actions: [read, write, delete]
      description: Manage Okta authorization servers
    - resource: auth-server-scopes
      actions: [read, write, delete]
      description: Manage Okta authorization-server scopes
    - resource: auth-server-claims
      actions: [read, write, delete]
      description: Manage Okta authorization-server claims
    - resource: auth-server-policies
      actions: [read, write, delete]
      description: Manage Okta authorization-server policies
    - resource: apps
      actions: [read, write, delete]
      description: Manage Okta application integrations
    - resource: app-group-assignments
      actions: [read, write, delete]
      description: Manage Okta application group assignments
    - resource: threat-insight
      actions: [read, write]
      description: Manage Okta ThreatInsight org settings (suspicious-request action + exempt zones)
    - resource: log-streams
      actions: [read, write, delete]
      description: Manage Okta log streams (AWS EventBridge / Splunk Cloud System Log export)
    - resource: device-assurance-policies
      actions: [read, write, delete]
      description: Manage Okta device assurance policies (per-platform device posture requirements)
    - resource: user-types
      actions: [read, write, delete]
      description: Manage Okta user types (named user profile-schema containers)
    - resource: custom-admin-roles
      actions: [read, write, delete]
      description: Manage Okta custom admin roles (least-privilege permission bundles)
    - resource: resource-sets
      actions: [read, write, delete]
      description: Manage Okta resource sets (resource collections that scope custom admin roles)

pipeline:
  configurationTypes:
    - id: policies
      name: Policies
      description: Sign-on / password / authenticator-enrollment policies and their rules
      canvasTemplate: config-types/policies/canvas.yaml
      defaultConfig: config-types/policies/defaults.yaml
      handlers:
        validate: config-types/policies/validate
        deploy: config-types/policies/deploy
        rollback: config-types/policies/rollback
        healthCheck: config-types/policies/healthCheck
        driftDetect: config-types/policies/driftDetect
        getStatus: config-types/policies/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: group-rules
      name: Group Rules
      description: Dynamic group-assignment rules (must be deactivated before change)
      canvasTemplate: config-types/group-rules/canvas.yaml
      defaultConfig: config-types/group-rules/defaults.yaml
      handlers:
        validate: config-types/group-rules/validate
        deploy: config-types/group-rules/deploy
        rollback: config-types/group-rules/rollback
        healthCheck: config-types/group-rules/healthCheck
        driftDetect: config-types/group-rules/driftDetect
        getStatus: config-types/group-rules/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: groups
      name: Groups
      description: Okta groups (OKTA_GROUP) and their memberships (built-in groups are protected)
      canvasTemplate: config-types/groups/canvas.yaml
      defaultConfig: config-types/groups/defaults.yaml
      handlers:
        validate: config-types/groups/validate
        deploy: config-types/groups/deploy
        rollback: config-types/groups/rollback
        healthCheck: config-types/groups/healthCheck
        driftDetect: config-types/groups/driftDetect
        getStatus: config-types/groups/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: network-zones
      name: Network Zones
      description: Network zones — IP (CIDR gateways) and dynamic (ASN/geo); system zones protected
      canvasTemplate: config-types/network-zones/canvas.yaml
      defaultConfig: config-types/network-zones/defaults.yaml
      handlers:
        validate: config-types/network-zones/validate
        deploy: config-types/network-zones/deploy
        rollback: config-types/network-zones/rollback
        healthCheck: config-types/network-zones/healthCheck
        driftDetect: config-types/network-zones/driftDetect
        getStatus: config-types/network-zones/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false


    - id: trusted-origins
      name: Trusted Origins
      description: CORS / redirect / iframe-embed origin allowlist
      canvasTemplate: config-types/trusted-origins/canvas.yaml
      defaultConfig: config-types/trusted-origins/defaults.yaml
      handlers:
        validate: config-types/trusted-origins/validate
        deploy: config-types/trusted-origins/deploy
        rollback: config-types/trusted-origins/rollback
        healthCheck: config-types/trusted-origins/healthCheck
        driftDetect: config-types/trusted-origins/driftDetect
        getStatus: config-types/trusted-origins/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: behavior-rules
      name: Behavior Rules
      description: Behavioral detection rules (velocity, anomalous location/IP/device)
      canvasTemplate: config-types/behavior-rules/canvas.yaml
      defaultConfig: config-types/behavior-rules/defaults.yaml
      handlers:
        validate: config-types/behavior-rules/validate
        deploy: config-types/behavior-rules/deploy
        rollback: config-types/behavior-rules/rollback
        healthCheck: config-types/behavior-rules/healthCheck
        driftDetect: config-types/behavior-rules/driftDetect
        getStatus: config-types/behavior-rules/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: authenticators
      name: Authenticators
      description: Authenticator configuration and enablement (no delete; built-ins update-only)
      canvasTemplate: config-types/authenticators/canvas.yaml
      defaultConfig: config-types/authenticators/defaults.yaml
      handlers:
        validate: config-types/authenticators/validate
        deploy: config-types/authenticators/deploy
        rollback: config-types/authenticators/rollback
        healthCheck: config-types/authenticators/healthCheck
        driftDetect: config-types/authenticators/driftDetect
        getStatus: config-types/authenticators/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: idps
      name: Identity Providers
      description: External IdPs (OIDC/SAML/social) — sensitive; secrets excluded from drift
      canvasTemplate: config-types/idps/canvas.yaml
      defaultConfig: config-types/idps/defaults.yaml
      handlers:
        validate: config-types/idps/validate
        deploy: config-types/idps/deploy
        rollback: config-types/idps/rollback
        healthCheck: config-types/idps/healthCheck
        driftDetect: config-types/idps/driftDetect
        getStatus: config-types/idps/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: event-hooks
      name: Event Hooks
      description: Event hooks (delete needs INACTIVE; auth header is write-only)
      canvasTemplate: config-types/event-hooks/canvas.yaml
      defaultConfig: config-types/event-hooks/defaults.yaml
      handlers:
        validate: config-types/event-hooks/validate
        deploy: config-types/event-hooks/deploy
        rollback: config-types/event-hooks/rollback
        healthCheck: config-types/event-hooks/healthCheck
        driftDetect: config-types/event-hooks/driftDetect
        getStatus: config-types/event-hooks/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: inline-hooks
      name: Inline Hooks
      description: Inline hooks (token/SAML/registration transforms; secret write-only; org cap 50)
      canvasTemplate: config-types/inline-hooks/canvas.yaml
      defaultConfig: config-types/inline-hooks/defaults.yaml
      handlers:
        validate: config-types/inline-hooks/validate
        deploy: config-types/inline-hooks/deploy
        rollback: config-types/inline-hooks/rollback
        healthCheck: config-types/inline-hooks/healthCheck
        driftDetect: config-types/inline-hooks/driftDetect
        getStatus: config-types/inline-hooks/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: authorization-servers
      name: Authorization Servers
      description: Custom OAuth authorization servers (the 'default' server is protected)
      canvasTemplate: config-types/authorization-servers/canvas.yaml
      defaultConfig: config-types/authorization-servers/defaults.yaml
      handlers:
        validate: config-types/authorization-servers/validate
        deploy: config-types/authorization-servers/deploy
        rollback: config-types/authorization-servers/rollback
        healthCheck: config-types/authorization-servers/healthCheck
        driftDetect: config-types/authorization-servers/driftDetect
        getStatus: config-types/authorization-servers/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: auth-server-scopes
      name: Auth Server Scopes
      description: OAuth scopes on an authorization server (system scopes skipped)
      canvasTemplate: config-types/auth-server-scopes/canvas.yaml
      defaultConfig: config-types/auth-server-scopes/defaults.yaml
      handlers:
        validate: config-types/auth-server-scopes/validate
        deploy: config-types/auth-server-scopes/deploy
        rollback: config-types/auth-server-scopes/rollback
        healthCheck: config-types/auth-server-scopes/healthCheck
        driftDetect: config-types/auth-server-scopes/driftDetect
        getStatus: config-types/auth-server-scopes/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: auth-server-claims
      name: Auth Server Claims
      description: OAuth claims on an authorization server (system claims skipped)
      canvasTemplate: config-types/auth-server-claims/canvas.yaml
      defaultConfig: config-types/auth-server-claims/defaults.yaml
      handlers:
        validate: config-types/auth-server-claims/validate
        deploy: config-types/auth-server-claims/deploy
        rollback: config-types/auth-server-claims/rollback
        healthCheck: config-types/auth-server-claims/healthCheck
        driftDetect: config-types/auth-server-claims/driftDetect
        getStatus: config-types/auth-server-claims/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: auth-server-policies
      name: Auth Server Policies
      description: OAuth access policies + rules on an authorization server (system policies skipped)
      canvasTemplate: config-types/auth-server-policies/canvas.yaml
      defaultConfig: config-types/auth-server-policies/defaults.yaml
      handlers:
        validate: config-types/auth-server-policies/validate
        deploy: config-types/auth-server-policies/deploy
        rollback: config-types/auth-server-policies/rollback
        healthCheck: config-types/auth-server-policies/healthCheck
        driftDetect: config-types/auth-server-policies/driftDetect
        getStatus: config-types/auth-server-policies/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false


    - id: apps
      name: Applications
      description: Application integrations (OIDC/SAML/SWA/bookmark); secrets write-only; system apps protected
      canvasTemplate: config-types/apps/canvas.yaml
      defaultConfig: config-types/apps/defaults.yaml
      handlers:
        validate: config-types/apps/validate
        deploy: config-types/apps/deploy
        rollback: config-types/apps/rollback
        healthCheck: config-types/apps/healthCheck
        driftDetect: config-types/apps/driftDetect
        getStatus: config-types/apps/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: app-group-assignments
      name: App Group Assignments
      description: Assign groups to applications (priority, profile overrides)
      canvasTemplate: config-types/app-group-assignments/canvas.yaml
      defaultConfig: config-types/app-group-assignments/defaults.yaml
      handlers:
        validate: config-types/app-group-assignments/validate
        deploy: config-types/app-group-assignments/deploy
        rollback: config-types/app-group-assignments/rollback
        healthCheck: config-types/app-group-assignments/healthCheck
        driftDetect: config-types/app-group-assignments/driftDetect
        getStatus: config-types/app-group-assignments/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: threat-insight
      name: ThreatInsight
      description: Org ThreatInsight settings — suspicious-request action (none/audit/block) + exempt zones (singleton)
      canvasTemplate: config-types/threat-insight/canvas.yaml
      defaultConfig: config-types/threat-insight/defaults.yaml
      handlers:
        validate: config-types/threat-insight/validate
        deploy: config-types/threat-insight/deploy
        rollback: config-types/threat-insight/rollback
        healthCheck: config-types/threat-insight/healthCheck
        driftDetect: config-types/threat-insight/driftDetect
        getStatus: config-types/threat-insight/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: log-streams
      name: Log Streams
      description: System Log export to AWS EventBridge / Splunk Cloud (type + settings immutable; Splunk token write-only; lifecycle activate/deactivate)
      canvasTemplate: config-types/log-streams/canvas.yaml
      defaultConfig: config-types/log-streams/defaults.yaml
      handlers:
        validate: config-types/log-streams/validate
        deploy: config-types/log-streams/deploy
        rollback: config-types/log-streams/rollback
        healthCheck: config-types/log-streams/healthCheck
        driftDetect: config-types/log-streams/driftDetect
        getStatus: config-types/log-streams/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: device-assurance-policies
      name: Device Assurance Policies
      description: Per-platform device posture requirements (a mapped policy must be unmapped before delete; platform immutable)
      canvasTemplate: config-types/device-assurance-policies/canvas.yaml
      defaultConfig: config-types/device-assurance-policies/defaults.yaml
      handlers:
        validate: config-types/device-assurance-policies/validate
        deploy: config-types/device-assurance-policies/deploy
        rollback: config-types/device-assurance-policies/rollback
        healthCheck: config-types/device-assurance-policies/healthCheck
        driftDetect: config-types/device-assurance-policies/driftDetect
        getStatus: config-types/device-assurance-policies/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: user-types
      name: User Types
      description: User type definitions (name immutable; the default type and assigned types are protected from deletion)
      canvasTemplate: config-types/user-types/canvas.yaml
      defaultConfig: config-types/user-types/defaults.yaml
      handlers:
        validate: config-types/user-types/validate
        deploy: config-types/user-types/deploy
        rollback: config-types/user-types/rollback
        healthCheck: config-types/user-types/healthCheck
        driftDetect: config-types/user-types/driftDetect
        getStatus: config-types/user-types/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: custom-admin-roles
      name: Custom Admin Roles
      description: Custom (least-privilege) admin roles; standard/built-in roles protected; permissions reconciled via sub-resource
      canvasTemplate: config-types/custom-admin-roles/canvas.yaml
      defaultConfig: config-types/custom-admin-roles/defaults.yaml
      handlers:
        validate: config-types/custom-admin-roles/validate
        deploy: config-types/custom-admin-roles/deploy
        rollback: config-types/custom-admin-roles/rollback
        healthCheck: config-types/custom-admin-roles/healthCheck
        driftDetect: config-types/custom-admin-roles/driftDetect
        getStatus: config-types/custom-admin-roles/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: resource-sets
      name: Resource Sets
      description: Resource sets that scope custom admin roles; resources (ORN/URL) reconciled via sub-resource
      canvasTemplate: config-types/resource-sets/canvas.yaml
      defaultConfig: config-types/resource-sets/defaults.yaml
      handlers:
        validate: config-types/resource-sets/validate
        deploy: config-types/resource-sets/deploy
        rollback: config-types/resource-sets/rollback
        healthCheck: config-types/resource-sets/healthCheck
        driftDetect: config-types/resource-sets/driftDetect
        getStatus: config-types/resource-sets/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

  pipelineEvents:
    - canvas:validated
    - canvas:deployed
    - canvas:rollback
    - drift:detected

server:
  entry: server/index
  routes:
    prefix: /api/apps/okta-identity

client:
  entry: client/index
  navLayout: sidebar
  pages:
    - path: /overview
      component: OverviewPage
      label: Overview
      icon: shield
      nav: sidebar
    - path: /setup
      component: SetupGuidePage
      label: Setup Guide
      icon: book
      nav: sidebar
    - path: /connections
      component: ConnectionsPage
      label: Connections
      icon: link
      nav: sidebar
      group: settings

hooks:
  onInstall: hooks/onInstall
  onUninstall: hooks/onUninstall

# Connection-level connectivity test: verifies a Connection's org domain + SSWS
# API token against the Okta Management API (GET /api/v1/org).
connectivity:
  testHandler: handlers/testConnection

settings:
  - key: request_timeout_seconds
    type: number
    label: Request Timeout (seconds)
    description: Per-request timeout for Okta API calls.
    default: 30
    required: false

        requiresCredential: true
        requiresConnectivity: false

    - id: captcha
      group: "Network & Security"
      name: CAPTCHA
      description: Org CAPTCHA (hCaptcha / reCAPTCHA v2) instance + org-wide enablement (singleton; secretKey write-only; detached from org before delete)
      canvasTemplate: config-types/captcha/canvas.yaml
      defaultConfig: config-types/captcha/defaults.yaml
      handlers:
        validate: config-types/captcha/validate
        deploy: config-types/captcha/deploy
        rollback: config-types/captcha/rollback
        healthCheck: config-types/captcha/healthCheck
        driftDetect: config-types/captcha/driftDetect
        getStatus: config-types/captcha/getStatus

        getStatus: config-types/profile-mappings/getStatus
      targets:
        componentTypes: [okta-org]
        requiresCredential: true
        requiresConnectivity: false

    - id: features
      group: "Profile & Schema"
      name: Features
      description: Self-service feature toggles (enable/disable lifecycle; no create/delete; mode=force honors dependencies)
      canvasTemplate: config-types/features/canvas.yaml
      defaultConfig: config-types/features/defaults.yaml

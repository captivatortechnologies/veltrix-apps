# =============================================================================
# Canvas Template — Tenable Managed Credentials
#
# Declares ONE credential — the item. Users add as many credentials as they need.
# A Tenable credential is a named, typed secret bundle (SSH, Windows, SNMPv3, …).
# Its logical identity is the credential NAME (the UUID Tenable assigns is the
# stable key we use for rollback); config-types/credentials/validate.ts enforces
# name uniqueness across the canvas.
#
# SECRET-BEARING: the per-type `settings` object holds WRITE-ONLY secrets
# (passwords, private keys, secret keys). Tenable never returns those on GET, so
# they are pushed on every deploy but NEVER read back or drift-checked. This is
# why the "Settings" group is a single freeform JSON field — the schema is
# per-type and secrets cannot round-trip.
#
# Field keys must match what config-types/credentials/validate.ts checks.
# =============================================================================

id: "tenable-vm-credentials"
name: "Credential Configuration"
toolType: "tenable-vm"
entityType: "credentials"
description: "Define Tenable managed scan credentials (SSH, Windows, SNMPv3, …) as code through the Tenable Credentials API. Secret settings are write-only and are never read back or drift-checked."

item:
  label: "Credential"
  identityField: "name"
  repeatable: true
  minItems: 1
  maxItems: 100
  groups:
    - name: "Credential"
      icon: "key"
      description: "Name, description and credential type"
      fields:
        - key: "name"
          label: "Name"
          fieldType: "text"
          required: true
          validation:
            maxLength: 255
            message: "A unique credential name, up to 255 characters. This is the logical identity Tenable matches on."
          helpText: "The credential's display name. Must be unique within the tenant — this is the identity used to find and update the credential on each deploy."

        - key: "description"
          label: "Description"
          fieldType: "text"
          validation:
            maxLength: 1000
          helpText: "Optional description shown in the Tenable console."

        - key: "type"
          label: "Type"
          fieldType: "text"
          required: true
          validation:
            maxLength: 255
            message: "A credential-type slug such as SSH or Windows."
          helpText: >
            The credential-type slug, e.g. SSH, Windows, SNMPv3. Pull the exact
            list of valid slugs from GET /credentials/types in your tenant. The
            type is fixed once a credential is created.

    - name: "Settings"
      icon: "lock"
      description: "Per-type settings (contains write-only secrets)"
      fields:
        - key: "settingsJson"
          label: "Settings (JSON)"
          fieldType: "textarea"
          required: true
          helpText: >
            The type-specific settings as a JSON object, e.g. for SSH
            {"auth_method":"password","username":"svc","password":"…"}. The exact
            keys depend on the credential type — see the type schema from
            GET /credentials/types. SECRETS (password, private_key, secret) are
            WRITE-ONLY: Tenable never returns them on read, so they are pushed on
            every deploy but are NEVER drift-checked and CANNOT be restored on
            rollback.

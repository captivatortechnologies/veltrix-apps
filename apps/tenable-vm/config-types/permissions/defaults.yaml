# Defaults for a new permission item.
#
# Intentionally empty: the platform no longer seeds system default values into a
# new item — it starts blank. Users manage their own default value sets and can
# apply one when creating an item. Any values here would be a flat map keyed by
# the canvas field keys (name, actions, objectsJson, subjectsJson), since a
# permission's presentational groups share one flat item record.
#
# There is deliberately no default subject/object: an access permission must be
# authored explicitly (SENSITIVE RBAC) rather than defaulted to anything.

  pipelineEvents:
    - canvas:validated
    - canvas:deployed
    - canvas:rollback
    - drift:detected

server:
  entry: server/index
  routes:
    prefix: /api/apps/tenable-vm

client:
  entry: client/index
  navLayout: sidebar
  pages:
    - path: /overview
      component: OverviewPage
      label: Overview
      icon: shield
      nav: sidebar
    - path: /setup
      component: SetupGuidePage
      label: Setup Guide
      icon: book
      nav: sidebar
    # Connections — the credentials this app authenticates with (access key +
    # secret key) plus the Tenable API endpoint each reaches.
    - path: /connections
      component: ConnectionsPage
      label: Connections
      icon: link
      nav: sidebar
      group: settings

hooks:
  onInstall: hooks/onInstall
  onUninstall: hooks/onUninstall

# Connection-level connectivity test: verifies a Connection's endpoint + API key
# pair against the Tenable API (GET /server/status).
connectivity:
  testHandler: handlers/testConnection

settings:
  - key: api_base_url
    type: string
    label: API Base URL
    description: >
      Tenable API endpoint. Defaults to the global cloud endpoint
      (https://cloud.tenable.com). Override only for a dedicated/FedRAMP host.
    default: "https://cloud.tenable.com"
    required: false
  - key: request_timeout_seconds
    type: number
    label: Request Timeout (seconds)
    description: Per-request timeout for Tenable API calls.
    default: 30
    required: false

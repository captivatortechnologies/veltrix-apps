    - id: users
      name: Users
      description: User accounts (identity — often SSO/SCIM-governed)
      canvasTemplate: config-types/users/canvas.yaml
      defaultConfig: config-types/users/defaults.yaml
      handlers:
        validate: config-types/users/validate
        deploy: config-types/users/deploy
        rollback: config-types/users/rollback
        healthCheck: config-types/users/healthCheck
        driftDetect: config-types/users/driftDetect

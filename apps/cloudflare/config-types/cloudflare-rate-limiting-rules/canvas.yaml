# =============================================================================
# Canvas Template — Cloudflare Rate Limiting Rules
#
# Declares ONE rate limiting rule — the item, in evaluation order. This config
# type OWNS the zone's http_ratelimit phase entrypoint: the canvas is the
# complete desired list of rate limiting rules, reconciled declaratively (a rule
# omitted from the canvas is removed). Rules are keyed by a stable `ref` derived
# from the rule name, so re-runs update rather than duplicate.
# =============================================================================

id: "cloudflare-cloudflare-rate-limiting-rules"
name: "Cloudflare Rate Limiting Rules Configuration"
toolType: "cloudflare"
entityType: "cloudflare-rate-limiting-rules"
description: "Define Cloudflare rate limiting rules as code (Rulesets phase http_ratelimit). The canvas is the full ordered rule list for the zone; rules are keyed by ref."

item:
  label: "Rate Limiting Rule"
  identityField: "name"
  repeatable: true
  minItems: 1
  maxItems: 200
  groups:
    - name: "Rate Limiting Rule"
      icon: "shield"
      description: "Name, action, expression and rate limit parameters"
      fields:
        - key: "name"
          label: "Name"
          fieldType: "text"
          required: true
          helpText: "The rule name (its logical identity; a stable ref is derived from it and shown as the description)."

        - key: "action"
          label: "Action"
          fieldType: "select"
          required: true
          defaultValue: "block"
          options:
            - { label: "Block", value: "block" }
            - { label: "Managed Challenge", value: "managed_challenge" }
            - { label: "JS Challenge", value: "js_challenge" }
            - { label: "Interactive Challenge", value: "challenge" }
            - { label: "Log", value: "log" }
          helpText: "What Cloudflare does when a client exceeds the rate limit."

        - key: "expression"
          label: "Expression"
          fieldType: "textarea"
          required: true
          helpText: "The Rules-language expression selecting the traffic to rate limit, e.g. (http.request.uri.path contains \"/api/\")."

        - key: "enabled"
          label: "Enabled"
          fieldType: "checkbox"
          defaultValue: true
          helpText: "Whether the rule is enabled."

        - key: "ratelimit_json"
          label: "Rate Limit (JSON)"
          fieldType: "textarea"
          required: true
          helpText: >
            JSON object for the rate limit parameters — e.g.
            {"characteristics":["ip.src"],"period":60,"requests_per_period":100,"mitigation_timeout":600}.
            `characteristics`/`period`/`requests_per_period` are required by Cloudflare.

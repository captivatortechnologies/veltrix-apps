id: splunk-cloud
name: Splunk Cloud Platform
version: "1.10.2"
vendor: Veltrix
description: >
  Manage Splunk Cloud Platform configurations as code through the
  Admin Config Service (ACS) API. Includes index management, HTTP Event
  Collector (HEC) tokens, IP allow lists, and private apps/add-ons
  (built to a .spl, vetted by AppInspect, installed through ACS).
  Roles are managed through the Splunk Cloud Platform REST API on the
  stack's management port 8089 — ACS cannot manage identity.
category: SIEM
license: Apache-2.0
homepage: https://github.com/captivatortechnologies/veltrix-apps/tree/main/apps/splunk-cloud
icon: "☁️"

platform:
  minVersion: "1.0.0"

# Rendered by the platform in the app's navbar and exposed to pages as
# --veltrix-app-primary / --veltrix-app-accent. Splunk brand orange (#FF6600)
# is the primary, shared with Splunk Enterprise; a warm pink accent (the cloud
# end of Splunk's pink→orange→yellow brand gradient) subtly distinguishes this
# app while keeping it unmistakably Splunk. The official Splunk
# "splunk> a Cisco company" lockup ships in assets/ as light + dark variants.
branding:
  primaryColor: "#FF6600"
  accentColor: "#F04E98"
  logo: ./assets/logo.png
  logoDark: ./assets/logo-dark.png

permissions:
  platform:
    - configuration-canvas:read
    - component:read
    - credential:read
  app:
    - resource: indexes
      actions: [read, write, delete]
      description: Manage Splunk Cloud index configurations via ACS
    - resource: hec-tokens
      actions: [read, write, delete]
      description: Manage Splunk Cloud HTTP Event Collector tokens via ACS
    - resource: ip-allowlists
      actions: [read, write, delete]
      description: Manage Splunk Cloud IP allow lists via ACS
    - resource: apps
      actions: [read, write, delete]
      description: >
        Build, AppInspect-vet and install Splunk Cloud private apps/add-ons via ACS
    - resource: roles
      actions: [read, write, delete]
      description: >
        Manage Splunk Cloud roles (capabilities, inherited roles, searchable indexes,
        search filters, quotas) via the Splunk Cloud Platform REST API on port 8089 —
        ACS cannot manage identity, and authorize.conf is on the AppInspect deny list

pipeline:
  configurationTypes:
    - id: indexes
      group: "Data"
      name: Indexes
      description: Splunk Cloud index definitions (datatype, searchable retention, sizing, DDAA/DDSS archival)
      canvasTemplate: config-types/indexes/canvas.yaml
      defaultConfig: config-types/indexes/defaults.yaml
      handlers:
        validate: config-types/indexes/validate
        deploy: config-types/indexes/deploy
        rollback: config-types/indexes/rollback
        healthCheck: config-types/indexes/healthCheck
        driftDetect: config-types/indexes/driftDetect
        getStatus: config-types/indexes/getStatus
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

    - id: hec-tokens
      group: "Data"
      name: HEC Tokens
      description: HTTP Event Collector token definitions (default index, allowed indexes, acknowledgement)
      canvasTemplate: config-types/hec-tokens/canvas.yaml
      defaultConfig: config-types/hec-tokens/defaults.yaml
      handlers:
        validate: config-types/hec-tokens/validate
        deploy: config-types/hec-tokens/deploy
        rollback: config-types/hec-tokens/rollback
        healthCheck: config-types/hec-tokens/healthCheck
        driftDetect: config-types/hec-tokens/driftDetect
        getStatus: config-types/hec-tokens/getStatus
        options: config-types/hec-tokens/options
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

    - id: ip-allowlists
      group: "Network & Access"
      name: IP Allow Lists
      description: Per-feature IP allow lists (search-api, hec, s2s, search-ui, idm-ui, idm-api, acs)
      canvasTemplate: config-types/ip-allowlists/canvas.yaml
      defaultConfig: config-types/ip-allowlists/defaults.yaml
      handlers:
        validate: config-types/ip-allowlists/validate
        deploy: config-types/ip-allowlists/deploy
        rollback: config-types/ip-allowlists/rollback
        healthCheck: config-types/ip-allowlists/healthCheck
        driftDetect: config-types/ip-allowlists/driftDetect
        getStatus: config-types/ip-allowlists/getStatus
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

    - id: outbound-ports
      group: "Network & Access"
      name: Outbound Ports
      description: Outbound connectivity rules — the destination subnets the stack may open connections to from a given port (e.g. 8089 for federated search / S2S)
      canvasTemplate: config-types/outbound-ports/canvas.yaml
      defaultConfig: config-types/outbound-ports/defaults.yaml
      handlers:
        validate: config-types/outbound-ports/validate
        deploy: config-types/outbound-ports/deploy
        rollback: config-types/outbound-ports/rollback
        healthCheck: config-types/outbound-ports/healthCheck
        driftDetect: config-types/outbound-ports/driftDetect
        getStatus: config-types/outbound-ports/getStatus
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

    - id: limits
      group: "System Settings"
      name: limits.conf Settings
      description: ACS-editable limits.conf settings (join, kv, pdf, scheduler, searchresults, spath, subsearch) managed as code via the ACS /adminconfig/v2/limits endpoint
      canvasTemplate: config-types/limits/canvas.yaml
      defaultConfig: config-types/limits/defaults.yaml
      handlers:
        validate: config-types/limits/validate
        deploy: config-types/limits/deploy
        rollback: config-types/limits/rollback
        healthCheck: config-types/limits/healthCheck
        driftDetect: config-types/limits/driftDetect
        getStatus: config-types/limits/getStatus
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

    - id: maintenance-windows
      group: "System Settings"
      name: Maintenance Windows
      description: >
        Customer-initiated change-freeze policy (a UTC date range holding
        Splunk-initiated and/or your own changes) managed through the ACS
        maintenance-windows API. Splunk-scheduled maintenance windows are view-only.
      canvasTemplate: config-types/maintenance-windows/canvas.yaml
      defaultConfig: config-types/maintenance-windows/defaults.yaml
      handlers:
        validate: config-types/maintenance-windows/validate
        deploy: config-types/maintenance-windows/deploy
        rollback: config-types/maintenance-windows/rollback
        healthCheck: config-types/maintenance-windows/healthCheck
        driftDetect: config-types/maintenance-windows/driftDetect
        getStatus: config-types/maintenance-windows/getStatus
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

    - id: ddss-self-storage
      group: "Data"
      name: DDSS Self Storage
      description: >
        Dynamic Data Self Storage locations — register customer-owned S3 (AWS) or
        GCS (GCP) buckets as self-managed destinations for frozen index data, via
        the ACS cloud-resources/self-storage-locations API (create-only)
      canvasTemplate: config-types/ddss-self-storage/canvas.yaml
      defaultConfig: config-types/ddss-self-storage/defaults.yaml
      handlers:
        validate: config-types/ddss-self-storage/validate
        deploy: config-types/ddss-self-storage/deploy
        rollback: config-types/ddss-self-storage/rollback
        healthCheck: config-types/ddss-self-storage/healthCheck
        driftDetect: config-types/ddss-self-storage/driftDetect
        getStatus: config-types/ddss-self-storage/getStatus
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

    - id: app-permissions
      group: "Apps"
      name: App Permissions
      description: >
        App read/write permissions — which roles can view/run (read) and edit
        (write) each installed app, managed via the ACS permissions/apps API
        (Victoria Experience; sc_admin)
      canvasTemplate: config-types/app-permissions/canvas.yaml
      defaultConfig: config-types/app-permissions/defaults.yaml
      handlers:
        validate: config-types/app-permissions/validate
        deploy: config-types/app-permissions/deploy
        rollback: config-types/app-permissions/rollback
        healthCheck: config-types/app-permissions/healthCheck
        driftDetect: config-types/app-permissions/driftDetect
        getStatus: config-types/app-permissions/getStatus
        options: config-types/app-permissions/options
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

    - id: apps
      group: "Apps"
      name: Splunk Apps
      description: >
        Splunk Cloud private apps and add-ons — authored as files, built to a .spl,
        vetted by AppInspect (failure/error/manual_check all block install) and
        installed through ACS
      canvasTemplate: config-types/apps/canvas.yaml
      defaultConfig: config-types/apps/defaults.yaml
      handlers:
        validate: config-types/apps/validate
        deploy: config-types/apps/deploy
        rollback: config-types/apps/rollback
        healthCheck: config-types/apps/healthCheck
        driftDetect: config-types/apps/driftDetect
        getStatus: config-types/apps/getStatus
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

    # Roles are the ONE object here that does not go through ACS: ACS cannot
    # manage identity, and authorize.conf is on Splunk Cloud's AppInspect deny
    # list, so roles cannot ship inside a private app either. They therefore use
    # the SAME endpoint Splunk Enterprise uses — /services/authorization/roles —
    # on the stack's management port 8089. Two prerequisites, both surfaced in
    # validate/deploy/healthCheck messages: Splunk Support must open port 8089
    # (closed by default), and the caller's IP must be on the stack's `search-api`
    # IP allow list — which the `ip-allowlists` type above manages.
    - id: roles
      group: "Access Control"
      name: Roles
      description: >
        Splunk Cloud roles (capabilities, inherited roles, searchable indexes,
        search filters, quotas), managed over the Splunk Cloud Platform REST API
        on the stack's management port 8089 — ACS cannot manage identity
      canvasTemplate: config-types/roles/canvas.yaml
      defaultConfig: config-types/roles/defaults.yaml
      handlers:
        validate: config-types/roles/validate
        deploy: config-types/roles/deploy
        rollback: config-types/roles/rollback
        healthCheck: config-types/roles/healthCheck
        driftDetect: config-types/roles/driftDetect
        getStatus: config-types/roles/getStatus
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        # No connectivity provider: the stack's REST API is reached directly over
        # the public internet, exactly like ACS — what gates it is the stack's
        # `search-api` IP allow list, not a tunnel.
        requiresConnectivity: false

    # Users, like roles, are IDENTITY — which ACS cannot manage. They use the
    # SAME stack REST API (/services/authentication/users) on management port
    # 8089, with the same two prerequisites (Support opens 8089; caller IP on the
    # `search-api` allow list). Passwords are intentionally out of scope: this
    # manages role assignment + attributes for EXISTING users only.
    - id: users
      group: "Access Control"
      name: Users
      description: >
        Splunk Cloud user role assignment and attributes (roles, email, full name,
        default app, timezone) for existing users, managed over the Splunk Cloud
        Platform REST API on the stack's management port 8089 — ACS cannot manage
        identity. Passwords are out of scope.
      canvasTemplate: config-types/users/canvas.yaml
      defaultConfig: config-types/users/defaults.yaml
      handlers:
        validate: config-types/users/validate
        deploy: config-types/users/deploy
        rollback: config-types/users/rollback
        healthCheck: config-types/users/healthCheck
        driftDetect: config-types/users/driftDetect
        getStatus: config-types/users/getStatus
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

    - id: authentication-tokens
      group: "Access Control"
      name: Authentication Token Settings
      description: >
        Stack-wide token-authentication settings (enablement and default token
        expiration), managed over the Splunk Cloud Platform REST API on the
        stack's management port 8089 — ACS exposes only per-token CRUD (secrets)
      canvasTemplate: config-types/authentication-tokens/canvas.yaml
      defaultConfig: config-types/authentication-tokens/defaults.yaml
      handlers:
        validate: config-types/authentication-tokens/validate
        deploy: config-types/authentication-tokens/deploy
        rollback: config-types/authentication-tokens/rollback
        healthCheck: config-types/authentication-tokens/healthCheck
        driftDetect: config-types/authentication-tokens/driftDetect
        getStatus: config-types/authentication-tokens/getStatus
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

    # SAML SSO is also identity — no ACS endpoint exists. Configured over the
    # stack REST API (/services/authentication/providers/SAML) on port 8089, like
    # roles/users. Scoped to SAML (Splunk Cloud has no OIDC REST endpoint); the
    # IdP certificate is uploaded separately in Splunk Web (idpCertPath is a
    # server-side path with no inline-cert REST param), and globally enabling SAML
    # as the stack auth scheme is a separate Splunk Web step.
    - id: sso
      group: "Access Control"
      name: SAML SSO
      description: >
        SAML single-sign-on identity provider configuration (entity ID, IdP SSO/SLO
        URLs, and role / real-name / mail assertion attribute mappings) managed over
        the Splunk Cloud Platform REST API on management port 8089 — ACS has no SAML
        endpoint. The IdP certificate is uploaded separately via Splunk Web.
      canvasTemplate: config-types/sso/canvas.yaml
      defaultConfig: config-types/sso/defaults.yaml
      handlers:
        validate: config-types/sso/validate
        deploy: config-types/sso/deploy
        rollback: config-types/sso/rollback
        healthCheck: config-types/sso/healthCheck
        driftDetect: config-types/sso/driftDetect
        getStatus: config-types/sso/getStatus
      targets:
        componentTypes: [splunk-cloud-stack]
        requiresCredential: true
        requiresConnectivity: false

  pipelineEvents:
    - canvas:validated
    - canvas:deployed
    - canvas:rollback
    - drift:detected

server:
  entry: server/index
  routes:
    prefix: /api/apps/splunk-cloud

client:
  entry: client/index
  # Tab layout (the platform default): the top strip keeps Overview / Setup Guide
  # / Pipeline / Configurations / Settings. Under the tab layout the platform now
  # renders the active group's members — the 13 configuration types — as a left
  # sub-nav sidebar beside the surface (see AppShell), so they no longer overflow
  # a horizontal sub-tab strip.
  pages:
    - path: /overview
      component: OverviewPage
      label: Overview
      icon: cloud
      nav: sidebar
      order: 1
      layout: standard
    - path: /setup
      component: SetupGuidePage
      label: Setup Guide
      icon: book
      nav: sidebar
      order: 2
      layout: standard
    # Access Servers — app-level Settings item (Settings nav group).
    - path: /access-servers
      component: AccessServersPage
      label: "Access Servers"
      icon: shield
      nav: sidebar
      group: settings
      order: 1
      layout: standard
    # Connections — app-level Settings item. Pairs each Splunk Cloud endpoint
    # (component) with the credential used to reach it.
    - path: /connections
      component: ConnectionsPage
      label: Connections
      icon: link
      nav: sidebar
      group: settings
      order: 2
      layout: standard
    # Operations — one-off stack actions (restart, retry failed op, export app),
    # invoked against a chosen connection. Not configuration deploys.
    - path: /operations
      component: OperationsPage
      label: Operations
      icon: zap
      nav: sidebar
      group: settings
      order: 3
      layout: standard

hooks:
  onInstall: hooks/onInstall
  onUninstall: hooks/onUninstall

# Connection-level connectivity test: verifies a Connection's stack + JWT against
# the Splunk Cloud Admin Config Service (ACS).
connectivity:
  testHandler: handlers/testConnection

# App operations — one-off actions (not config deploys) invoked from the
# Operations page and run in-process with the decrypted connection credential
# via POST /api/apps/splunk-cloud/operations/:operationId.
operations:
  - id: restart
    name: Restart Stack
    description: Initiate a (rolling) restart of the search head / SHC via the ACS restart-now endpoint
    handler: operations/restart
    destructive: true
    requiresCredential: true
  - id: retry-failed
    name: Retry Failed Operation
    description: Re-submit the latest failed ACS operation (private-app install / HEC token management)
    handler: operations/retry-failed
    requiresCredential: true
  - id: export-app
    name: Export App
    description: Download an installed private app as a .tar.gz (Victoria Experience; requires the export_apps capability)
    handler: operations/export-app
    requiresCredential: true

settings:
  - key: acs_base_url
    type: string
    label: ACS Base URL
    description: >
      Admin Config Service base URL. Use https://admin.splunkcloudgc.com
      for FedRAMP Moderate (IL2) stacks.
    default: https://admin.splunk.com
    required: false
  - key: experience
    type: select
    label: Splunk Cloud Experience
    description: >
      Victoria or Classic Experience. All configuration types in this app
      are supported on both; the setting is recorded with deployments and
      gates future Victoria-only capabilities (e.g. limits.conf).
    default: victoria
    required: false
    options:
      - label: Victoria
        value: victoria
      - label: Classic
        value: classic
  - key: request_timeout_seconds
    type: number
    label: ACS Request Timeout (seconds)
    description: Timeout applied to each ACS API request
    default: 30
    required: false
  - key: appinspect_max_wait_seconds
    type: number
    label: AppInspect Vetting Timeout (seconds)
    description: >
      How long to wait for AppInspect to finish vetting a private app package
      before failing the deployment. Vetting is far slower than an ACS call —
      a package with bin/ scripts routinely takes minutes.
    default: 900
    required: false

events:
  - component:created
  - component:deleted
  - credential:updated

# =============================================================================
# Canvas Template — Splunk Cloud HEC Tokens (ACS)
#
# Declares ONE token — the item. Users add as many tokens as they need.
# Field keys must match what config-types/hec-tokens/validate.ts checks.
#
# Note: token VALUES are generated by ACS and never stored in the canvas.
# =============================================================================

id: "splunk-cloud-hec-tokens"
name: "HEC Token Configuration"
toolType: "splunk-cloud"
entityType: "hec-tokens"
description: "Define Splunk Cloud HTTP Event Collector tokens (routing, acknowledgement) as code via the ACS API"

item:
  label: "HEC Token"
  identityField: "name"
  repeatable: true
  minItems: 1
  maxItems: 100
  groups:
    - name: "General"
      icon: "key"
      description: "Token identity, routing, and delivery"
      fields:
        - key: "name"
          label: "Token Name"
          fieldType: "text"
          required: true
          validation:
            pattern: "^[A-Za-z0-9][A-Za-z0-9_-]*$"
            maxLength: 100
            message: "Letters, numbers, underscores, hyphens; must begin with a letter or number"
          helpText: "Unique HEC token name on the stack. The token value is generated by ACS — never enter it here."

        - key: "defaultIndex"
          label: "Default Index"
          fieldType: "remote-select"
          optionsSource: "indexes"
          validation:
            pattern: "^[a-z0-9][a-z0-9_-]*$"
          helpText: "Index that receives events when the sender does not specify one. Search the stack's live indexes and pick one (the index name is stored). If omitted, ACS routes to \"default\" — ensure that index exists or events will be lost."

        - key: "allowedIndexes"
          label: "Allowed Indexes"
          fieldType: "remote-multiselect"
          optionsSource: "indexes"
          optionsMulti: true
          helpText: "Optional list of indexes this token may write to. Search the stack's live indexes and select one or more (the index names are stored). Must include the default index when set."

        - key: "defaultSource"
          label: "Default Source"
          fieldType: "text"
          helpText: "Optional source applied to events that do not specify one"

        - key: "defaultSourcetype"
          label: "Default Sourcetype"
          fieldType: "text"
          helpText: "Optional sourcetype applied to events that do not specify one"

        - key: "useAck"
          label: "Enable Indexer Acknowledgement"
          fieldType: "checkbox"
          defaultValue: false
          helpText: "Currently supported only for AWS Kinesis Data Firehose sources"

        - key: "disabled"
          label: "Disabled"
          fieldType: "checkbox"
          defaultValue: false
          helpText: "Deploy the token in a disabled state (it will not accept events)"
